# BGPInstance for an infra cluster route reflector — APAC region.
#
# This instance runs in the infra cluster, not in POP clusters.
# spec.routeReflector enables RR mode and sets the cluster ID.
# RR clients (POP overlay instances) peer toward this RR and receive
# reflected VPNv4/VPNv6 routes without requiring a full mesh between
# all POP nodes.
#
# The providerSelector targets the infra cluster's BGPProvider, which is
# bootstrapped with the rr-apac role label.
apiVersion: bgp.miloapis.com/v1alpha1
kind: BGPInstance
metadata:
  name: rr-apac
spec:
  providerSelector:
    matchLabels:
      bgp.datum.net/role: rr-apac
  asNumber: 65000
  addressFamilies:
    - afi: IPv4
      safi: VPNUnicast
    - afi: IPv6
      safi: VPNUnicast
  routeReflector:
    clusterID: "10.0.1.1"
