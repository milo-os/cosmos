# Written by management cluster cosmos into infra cluster via Karmada.
# routeReflectorClient: true designates the to-side peer as an RR client.
#
# This BGPSession configures the APAC route reflector (rr-apac-1) to treat
# the POP node (node-1 in tokyo) as an RR client. The RR side of the session
# is always written into the infra cluster; the client side is written into
# the POP cluster (see mgmt-bgpsession-overlay-rrs.yaml).
#
# Together, the two BGPSession resources (one in infra, one in POP) produce
# the symmetric BGPPeer objects needed for the session to establish.
apiVersion: bgp.miloapis.com/v1alpha1
kind: BGPSession
metadata:
  name: apac-rr-1-to-tokyo-node-1
spec:
  fromProviderSelector:
    matchLabels:
      bgp.datum.net/role: rr-apac
      bgp.miloapis.com/node: rr-apac-1
  fromInstanceRef: rr-apac
  toPeers:
    - address: "2001:db8::node-1"     # resolved from BGPProvider/node-1-gobgp
      asNumber: 65000
      instanceRef: rr-apac
      routeReflectorClient: true       # RR designates this peer as its client
  addressFamilies:
    - afi: IPv4
      safi: VPNUnicast
    - afi: IPv6
      safi: VPNUnicast
