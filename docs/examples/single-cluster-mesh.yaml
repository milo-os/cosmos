# Single-cluster full-mesh iBGP example.
#
# All nodes in the cluster peer with each other directly. With N nodes, this
# creates N*(N-1)/2 BGPSession resources. Full mesh is practical for small
# clusters (up to ~10 nodes). For larger clusters, use route-reflector.yaml.
#
# Prerequisites:
# - BGPEndpoint resources exist for each node, labelled with the cluster name.
# - BGPConfiguration has been applied with the cluster AS number.
#
# Apply: kubectl apply -f single-cluster-mesh.yaml

---
# BGPConfiguration: one per cluster, named "default".
apiVersion: bgp.miloapis.com/v1alpha1
kind: BGPConfiguration
metadata:
  name: default
spec:
  asNumber: 65001
  listenPort: 1790
  routerIDSource: NodeIP
  addressFamilies:
    - afi: IPv6
      safi: Unicast

---
# Example BGPEndpoints: one per node. In production these are created by a
# node operator automatically. Replace addresses with actual node IPv6 addresses.
apiVersion: bgp.miloapis.com/v1alpha1
kind: BGPEndpoint
metadata:
  name: node-worker-01
  labels:
    bgp.miloapis.com/role: node
    bgp.miloapis.com/cluster: cluster-a
spec:
  address: "2001:db8:1::1"
  asNumber: 65001

---
apiVersion: bgp.miloapis.com/v1alpha1
kind: BGPEndpoint
metadata:
  name: node-worker-02
  labels:
    bgp.miloapis.com/role: node
    bgp.miloapis.com/cluster: cluster-a
spec:
  address: "2001:db8:1::2"
  asNumber: 65001

---
apiVersion: bgp.miloapis.com/v1alpha1
kind: BGPEndpoint
metadata:
  name: node-worker-03
  labels:
    bgp.miloapis.com/role: node
    bgp.miloapis.com/cluster: cluster-a
spec:
  address: "2001:db8:1::3"
  asNumber: 65001

---
# BGPPeeringPolicy: creates a BGPSession for every pair of selected endpoints.
# With 3 nodes, this creates 3 sessions:
#   node-worker-01 <-> node-worker-02
#   node-worker-01 <-> node-worker-03
#   node-worker-02 <-> node-worker-03
apiVersion: bgp.miloapis.com/v1alpha1
kind: BGPPeeringPolicy
metadata:
  name: cluster-a-mesh
spec:
  selector:
    matchLabels:
      bgp.miloapis.com/role: node
      bgp.miloapis.com/cluster: cluster-a
  mode: mesh
  sessionTemplate:
    holdTime: 90
    keepaliveTime: 30

---
# Verify sessions after applying:
#   kubectl get bgpsess
#   kubectl get bgppp cluster-a-mesh -o jsonpath='{.status}'
