# rejected-configurations.yaml
#
# This file documents invalid or unsupported configurations and the error or
# condition each produces. Use it as a reference for what NOT to do.
#
# Each section is a separate YAML document separated by ---.
# None of these should be applied to a running cluster.

---
# INVALID: BGPPeer with invalid AFI/SAFI combination — rejected by CEL validation
#
# The AddressFamily type enforces valid AFI/SAFI pairs:
#   ipv4/unicast, ipv6/unicast, l2vpn/evpn
# Using ipv4 with evpn violates the CEL rule:
#   self.afi == 'ipv4' ? self.safi == 'unicast' : true
# The API server rejects the resource at admission time.
apiVersion: bgp.miloapis.com/v1alpha1
kind: BGPPeer
metadata:
  name: invalid-address-family
  namespace: default
spec:
  routerRef:
    name: node-1-underlay
  peerASN: 65000
  address: "2001:db8::1"
  addressFamilies:
    - afi: ipv4
      safi: evpn        # ERROR: ipv4 only supports unicast SAFI

---
# INVALID: BGPPeer with both routerRef and routerSelector set — rejected by CEL validation
#
# A BGPPeer must use exactly one router selection mechanism. Setting both
# routerRef and routerSelector violates the CEL rule:
#   has(self.routerRef) != has(self.routerSelector)
# The API server rejects the resource at admission time.
apiVersion: bgp.miloapis.com/v1alpha1
kind: BGPPeer
metadata:
  name: invalid-dual-router-selection
  namespace: default
spec:
  routerRef:
    name: node-1-underlay
  routerSelector:                 # ERROR: cannot set both routerRef and routerSelector
    matchLabels:
      bgp.miloapis.com/role: fabric
  address: "2001:db8::1"
  peerASN: 65000
  addressFamilies:
    - afi: ipv6
      safi: unicast

---
# INVALID: BGPRoutePolicy with set actions on a deny term — rejected by CEL validation
#
# Set actions (community manipulation, local preference) are only valid when
# the term action is "permit". Setting them on a "deny" term violates:
#   self.action == 'deny' ? !has(self.set) : true
# The API server rejects the resource at admission time.
apiVersion: bgp.miloapis.com/v1alpha1
kind: BGPRoutePolicy
metadata:
  name: invalid-set-on-deny
  namespace: default
spec:
  routerRef:
    name: node-1-underlay
  direction: export
  terms:
    - sequence: 10
      match:
        any: true
      action: deny
      set:              # ERROR: set actions are not permitted on deny terms
        localPreference: 100

---
# BLOCKED: Deletion of BGPRouter still referenced by BGPPeer — deletion blocked
#
# A BGPRouter cannot be deleted while any BGPPeer, BGPAdvertisement, or
# BGPRoutePolicy in the same namespace references it via routerRef.
# The cleanup finalizer checks for active dependents before removing itself.
#
# Resolution: delete or update all dependent resources first.
#
# To force removal (destructive — orphans remote agent state):
#   kubectl patch bgprouter/node-1-underlay -n default \
#     --type=merge -p '{"metadata":{"finalizers":[]}}'
apiVersion: bgp.miloapis.com/v1alpha1
kind: BGPRouter
metadata:
  name: node-1-underlay
  namespace: default
  finalizers:
    - cosmos.bgp.miloapis.com/cleanup
  deletionTimestamp: "2024-01-01T12:00:00Z"
spec:
  targetRef:
    kind: Node
    name: node-1
  roles:
    - fabric
  localASN: 65000
  routerID: "10.0.0.1"
  addressFamilies:
    - afi: ipv6
      safi: unicast
# Expected status:
#   conditions:
#     - type: DeletionBlocked
#       status: "True"
#       reason: ReferencedByPeer
#       message: "BGPPeer/underlay-peer references this router"
