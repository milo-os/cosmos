---
apiVersion: bgp.miloapis.com/v1alpha1
kind: BGPRouter
metadata:
  name: bgp-e2e-worker
  namespace: default
spec:
  targetRef:
    kind: Node
    name: bgp-e2e-worker
  roles:
    - fabric
  localASN: 65000
  routerID: "10.0.0.1"
  addressFamilies:
    - afi: ipv6
      safi: unicast
