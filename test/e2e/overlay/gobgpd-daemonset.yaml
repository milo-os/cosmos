apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gobgpd
  namespace: bgp-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gobgpd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gobgpd
    spec:
      hostNetwork: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      initContainers:
        - name: config-gen
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              NODE_IP=$(ip -6 addr show scope global | awk '/inet6/{print $2}' | cut -d/ -f1 | head -1)
              if [ -z "$NODE_IP" ]; then
                echo "ERROR: no global-scope IPv6 address found"
                exit 1
              fi
              # Compute router-id: last 4 bytes of the IPv6 address formatted as a
              # dotted-quad IPv4 string.  This must match ipv6ToRouterID in
              # internal/controller/provider_reconciler.go so that ConfigureSpeaker
              # sees no mismatch and never calls StopBgp (which permanently breaks
              # the GoBGP v4 server — it cannot be restarted in-process).
              ROUTER_ID=$(awk -v ip="$NODE_IP" 'BEGIN {
                for(i=0;i<=9;i++) h[i""]=i
                h["a"]=10;h["b"]=11;h["c"]=12;h["d"]=13;h["e"]=14;h["f"]=15
                ip=tolower(ip); sub(/%.*$/,"",ip)
                if(index(ip,"::")){
                  n=split(ip,p,"::")
                  nl=(p[1]==""?0:split(p[1],L,":"))
                  nr=(n<2||p[2]==""?0:split(p[2],R,":"))
                  k=0
                  for(i=1;i<=nl;i++) g[++k]=L[i]
                  for(i=1;i<=8-nl-nr;i++) g[++k]="0"
                  for(i=1;i<=nr;i++) g[++k]=R[i]
                } else { split(ip,g,":") }
                hex=sprintf("%04s%04s",g[7],g[8]); gsub(/ /,"0",hex)
                for(i=0;i<4;i++){v=h[substr(hex,i*2+1,1)]*16+h[substr(hex,i*2+2,1)];printf "%s%d",(i?".":""),v}
                print ""
              }')
              echo "Generating gobgp.conf with router-id=$ROUTER_ID local-address=$NODE_IP"
              sed -e "s/NODE_IP_PLACEHOLDER/$NODE_IP/g" \
                  -e "s/ROUTER_ID_PLACEHOLDER/$ROUTER_ID/g" \
                  /config-template/gobgp.conf > /config/gobgp.conf
              cat /config/gobgp.conf
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: config
              mountPath: /config
      containers:
        - name: gobgpd
          image: gobgpd:e2e-local
          imagePullPolicy: IfNotPresent
          args: ["-f", "/config/gobgp.conf", "--log-level=debug", "-p"]
          ports:
            - containerPort: 50051
              protocol: TCP
              name: grpc
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config-template
          configMap:
            name: gobgpd-config
        - name: config
          emptyDir: {}
      tolerations:
        - operator: Exists
