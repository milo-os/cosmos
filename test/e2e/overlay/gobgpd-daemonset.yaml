apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gobgpd
  namespace: bgp-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gobgpd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gobgpd
    spec:
      hostNetwork: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      initContainers:
        - name: config-gen
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              NODE_IP=$(ip -6 addr show scope global | awk '/inet6/{print $2}' | cut -d/ -f1 | head -1)
              if [ -z "$NODE_IP" ]; then
                echo "ERROR: no global-scope IPv6 address found"
                exit 1
              fi
              echo "Generating gobgp.conf with router-id=$NODE_IP"
              sed "s/NODE_IP_PLACEHOLDER/$NODE_IP/g" /config-template/gobgp.conf > /config/gobgp.conf
              cat /config/gobgp.conf
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: config
              mountPath: /config
      containers:
        - name: gobgpd
          image: gobgpd:e2e-local
          imagePullPolicy: IfNotPresent
          args: ["-f", "/config/gobgp.conf", "--log-level=debug", "-p"]
          ports:
            - containerPort: 1790
              protocol: TCP
              name: bgp
            - containerPort: 50051
              protocol: TCP
              name: grpc
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config-template
          configMap:
            name: gobgpd-config
        - name: config
          emptyDir: {}
      tolerations:
        - operator: Exists
