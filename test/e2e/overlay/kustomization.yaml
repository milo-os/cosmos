apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base deploy resources: namespace, RBAC, DaemonSet
resources:
  - ../../../config/deploy

# Override image tags for local e2e builds
images:
  - name: ghcr.io/milo-os/cosmos
    newTag: e2e-local

patches:
  - target:
      kind: DaemonSet
      name: cosmos
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/args
        value:
          - --metrics-addr=:8086
          - --health-addr=:8087
