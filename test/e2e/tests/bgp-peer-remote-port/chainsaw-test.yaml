apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: bgp-peer-remote-port
spec:
  description: >
    Verify that BGPPeer resources with explicit remotePort and without remotePort
    are accepted by the API server and created correctly by the operator.
  steps:
    - name: cleanup-stale
      try:
        - script:
            content: |
              kubectl delete bgppeer e2e-rp-explicit e2e-rp-default 2>/dev/null || true
              kubectl delete configmap bgp-e2e-rp-ips 2>/dev/null || true
              echo "OK: stale resources cleaned up"

    - name: resolve-worker-ips
      try:
        - script:
            content: |
              set -e
              get_ipv6() {
                kubectl get node "$1" \
                  -o jsonpath='{range .status.addresses[?(@.type=="InternalIP")]}{.address}{"\n"}{end}' \
                  | grep ':' | head -1
              }
              W1=$(get_ipv6 bgp-e2e-worker)
              W2=$(get_ipv6 bgp-e2e-worker2)
              echo "worker1=${W1} worker2=${W2}"
              kubectl create configmap bgp-e2e-rp-ips \
                --from-literal=worker1="${W1}" \
                --from-literal=worker2="${W2}" \
                --dry-run=client -o yaml | kubectl apply -f -

    - name: create-peers
      try:
        - script:
            content: |
              set -e
              W2=$(kubectl get configmap bgp-e2e-rp-ips -o jsonpath='{.data.worker2}')

              kubectl apply -f - <<EOF
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPPeer
              metadata:
                name: e2e-rp-explicit
                labels:
                  e2e-test: bgp-peer-remote-port
              spec:
                instanceRef: default
                providerSelector:
                  matchLabels:
                    bgp.miloapis.com/node: bgp-e2e-worker
                address: "${W2}"
                asNumber: 65000
                remotePort: 1790
              ---
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPPeer
              metadata:
                name: e2e-rp-default
                labels:
                  e2e-test: bgp-peer-remote-port
              spec:
                instanceRef: default
                providerSelector:
                  matchLabels:
                    bgp.miloapis.com/node: bgp-e2e-worker
                address: "2001:db8::ffff"
                asNumber: 65000
              EOF

    - name: assert-peers-created
      try:
        - assert:
            resource:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPPeer
              metadata:
                name: e2e-rp-explicit
              spec:
                remotePort: 1790
        - assert:
            resource:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPPeer
              metadata:
                name: e2e-rp-default
              (spec.remotePort == `null` || spec.remotePort == `0`): true

      finally:
        - delete:
            ref:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPPeer
              name: e2e-rp-explicit
        - delete:
            ref:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPPeer
              name: e2e-rp-default
        - delete:
            ref:
              apiVersion: v1
              kind: ConfigMap
              name: bgp-e2e-rp-ips
