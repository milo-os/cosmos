apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: session-lifecycle
spec:
  description: >
    Verify the lifecycle of BGPSessions: sessions reach PeersReconciled state
    and the session finalizer cleans up generated BGPPeers on deletion.
  steps:
    - name: cleanup-stale
      try:
        - script:
            content: |
              kubectl delete bgpsession e2e-lifecycle-w2 e2e-lifecycle-w3 2>/dev/null || true
              echo "OK: stale resources cleaned up"

    - name: create-sessions
      try:
        - script:
            content: |
              set -e
              get_ipv6() {
                kubectl get node "$1" \
                  -o jsonpath='{range .status.addresses[?(@.type=="InternalIP")]}{.address}{"\n"}{end}' \
                  | grep ':' | head -1
              }
              W2=$(get_ipv6 bgp-e2e-worker2)
              W3=$(get_ipv6 bgp-e2e-worker3)

              kubectl apply -f - <<EOF
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPSession
              metadata:
                name: e2e-lifecycle-w2
                labels:
                  e2e-test: session-lifecycle
              spec:
                fromProviderSelector:
                  matchLabels:
                    bgp.miloapis.com/node: bgp-e2e-worker2
                    bgp.miloapis.com/daemon: GoBGP
                fromInstanceRef: default
                toPeers:
                  - address: "${W3}"
                    asNumber: 65000
                    instanceRef: default
                    remotePort: 1790
                addressFamilies:
                  - afi: IPv6
                    safi: Unicast
                timers:
                  holdTime: 30
                  keepalive: 10
              ---
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPSession
              metadata:
                name: e2e-lifecycle-w3
                labels:
                  e2e-test: session-lifecycle
              spec:
                fromProviderSelector:
                  matchLabels:
                    bgp.miloapis.com/node: bgp-e2e-worker3
                    bgp.miloapis.com/daemon: GoBGP
                fromInstanceRef: default
                toPeers:
                  - address: "${W2}"
                    asNumber: 65000
                    instanceRef: default
                    remotePort: 1790
                addressFamilies:
                  - afi: IPv6
                    safi: Unicast
                timers:
                  holdTime: 30
                  keepalive: 10
              EOF

    - name: assert-session-reconciled
      try:
        # PeersReconciled=True means the SessionReconciler generated the BGPPeer.
        - assert:
            resource:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPSession
              metadata:
                name: e2e-lifecycle-w2
              status:
                (conditions[?type=='PeersReconciled'].status | [0]): "True"

    - name: delete-session-and-verify-peer-removed
      try:
        - delete:
            ref:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPSession
              name: e2e-lifecycle-w2
        # Wait for the generated BGPPeer to disappear. The session finalizer
        # deletes all BGPPeers before removing the finalizer.
        - script:
            content: |
              set -e
              ATTEMPTS=0
              COUNT=1
              while [ "$COUNT" -gt 0 ] && [ "$ATTEMPTS" -lt 60 ]; do
                COUNT=$(kubectl get bgppeers \
                  -l bgp.miloapis.com/session-name=e2e-lifecycle-w2 \
                  --no-headers 2>/dev/null | wc -l)
                ATTEMPTS=$((ATTEMPTS+1))
                [ "$COUNT" -gt 0 ] && sleep 5
              done
              if [ "$COUNT" -gt 0 ]; then
                echo "ERROR: BGPPeers for e2e-lifecycle-w2 still exist after ${ATTEMPTS} attempts"
                kubectl get bgppeers -l bgp.miloapis.com/session-name=e2e-lifecycle-w2 -o yaml || true
                exit 1
              fi
              echo "OK: BGPPeers deleted (finalizer completed)"

      finally:
        - delete:
            ref:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPSession
              name: e2e-lifecycle-w3
