apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: session-lifecycle
spec:
  description: >
    Verify the lifecycle of BGPSessions: sessions reach Established state and
    GoBGP removes peers when sessions are deleted. Uses worker2 as the observed
    node — its session targets worker3, and deletion is verified by watching the
    generated BGPPeer disappear (the session finalizer cleans up GoBGP before
    removing the BGPPeer resource).
  steps:
    - name: cleanup-stale
      try:
        - script:
            content: |
              kubectl delete bgpsession e2e-lifecycle-w2 e2e-lifecycle-w3 2>/dev/null || true
              echo "OK: stale resources cleaned up"

    - name: create-sessions
      try:
        - script:
            content: |
              set -e
              get_ipv6() {
                kubectl get node "$1" \
                  -o jsonpath='{range .status.addresses[?(@.type=="InternalIP")]}{.address}{"\n"}{end}' \
                  | grep ':' | head -1
              }
              W2=$(get_ipv6 bgp-e2e-worker2)
              W3=$(get_ipv6 bgp-e2e-worker3)

              kubectl apply -f - <<EOF
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPSession
              metadata:
                name: e2e-lifecycle-w2
                labels:
                  e2e-test: session-lifecycle
              spec:
                fromProviderSelector:
                  matchLabels:
                    bgp.miloapis.com/node: bgp-e2e-worker2
                    bgp.miloapis.com/daemon: GoBGP
                fromInstanceRef: default
                toPeers:
                  - address: "${W3}"
                    asNumber: 65000
                    instanceRef: default
                addressFamilies:
                  - afi: IPv6
                    safi: Unicast
                timers:
                  holdTime: 30
                  keepalive: 10
              ---
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPSession
              metadata:
                name: e2e-lifecycle-w3
                labels:
                  e2e-test: session-lifecycle
              spec:
                fromProviderSelector:
                  matchLabels:
                    bgp.miloapis.com/node: bgp-e2e-worker3
                    bgp.miloapis.com/daemon: GoBGP
                fromInstanceRef: default
                toPeers:
                  - address: "${W2}"
                    asNumber: 65000
                    instanceRef: default
                addressFamilies:
                  - afi: IPv6
                    safi: Unicast
                timers:
                  holdTime: 30
                  keepalive: 10
              EOF

    - name: assert-session-reconciled
      try:
        # PeersReconciled=True means the SessionReconciler generated the BGPPeer.
        - assert:
            resource:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPSession
              metadata:
                name: e2e-lifecycle-w2
              status:
                (conditions[?type=='PeersReconciled'].status | [0]): "True"

    - name: assert-session-established
      try:
        - script:
            content: |
              set -e
              POD=$(kubectl -n bgp-system get pod \
                -l app.kubernetes.io/name=bgp \
                --field-selector spec.nodeName=bgp-e2e-worker2 \
                -o jsonpath='{.items[0].metadata.name}')
              echo "Waiting for GoBGP session in pod: $POD"

              ATTEMPTS=0
              ESTABLISHED=0
              while [ "$ESTABLISHED" -lt 1 ] && [ "$ATTEMPTS" -lt 60 ]; do
                ESTABLISHED=$(kubectl -n bgp-system exec "$POD" -c gobgpd -- \
                  gobgp neighbor 2>/dev/null | grep -c "Establ" || true)
                ATTEMPTS=$((ATTEMPTS+1))
                [ "$ESTABLISHED" -lt 1 ] && sleep 5
              done
              if [ "$ESTABLISHED" -lt 1 ]; then
                echo "ERROR: no BGP session reached Established on bgp-e2e-worker2"
                kubectl -n bgp-system exec "$POD" -c gobgpd -- gobgp neighbor || true
                exit 1
              fi
              echo "OK: BGP session Established"

    - name: verify-gobgp-peer-present
      try:
        - script:
            content: |
              set -e
              # Get the IPv6 address of worker3 (the peer from worker2's perspective)
              W3=$(kubectl get node bgp-e2e-worker3 \
                -o jsonpath='{range .status.addresses[?(@.type=="InternalIP")]}{.address}{"\n"}{end}' \
                | grep ':' | head -1)
              POD=$(kubectl -n bgp-system get pod \
                -l app.kubernetes.io/name=bgp \
                --field-selector spec.nodeName=bgp-e2e-worker2 \
                -o jsonpath='{.items[0].metadata.name}')
              echo "Checking GoBGP peer $W3 in pod $POD (on bgp-e2e-worker2)"
              kubectl -n bgp-system exec "$POD" -c gobgpd -- \
                gobgp neighbor | grep -q "${W3}"
              echo "OK: peer $W3 present in GoBGP"

    - name: delete-session-and-verify-peer-removed
      try:
        - delete:
            ref:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPSession
              name: e2e-lifecycle-w2
        # Wait for the generated BGPPeer to disappear. The session finalizer
        # deletes all BGPPeers (triggering PeerReconciler GoBGP cleanup) before
        # removing the finalizer, so "peer gone" means GoBGP cleanup completed.
        - script:
            content: |
              set -e
              ATTEMPTS=0
              COUNT=1
              while [ "$COUNT" -gt 0 ] && [ "$ATTEMPTS" -lt 60 ]; do
                COUNT=$(kubectl get bgppeers \
                  -l bgp.miloapis.com/session-name=e2e-lifecycle-w2 \
                  --no-headers 2>/dev/null | wc -l)
                ATTEMPTS=$((ATTEMPTS+1))
                [ "$COUNT" -gt 0 ] && sleep 5
              done
              if [ "$COUNT" -gt 0 ]; then
                echo "ERROR: BGPPeers for e2e-lifecycle-w2 still exist after ${ATTEMPTS} attempts"
                kubectl get bgppeers -l bgp.miloapis.com/session-name=e2e-lifecycle-w2 -o yaml || true
                exit 1
              fi
              echo "OK: BGPPeers deleted (finalizer completed — GoBGP peer was removed)"

      finally:
        - delete:
            ref:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPSession
              name: e2e-lifecycle-w3
