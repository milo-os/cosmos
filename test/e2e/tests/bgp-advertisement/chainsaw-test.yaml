apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: bgp-advertisement
spec:
  description: >
    Verify that BGPAdvertisement resources are accepted by the API server and
    that the operator reconciles them, reporting provider status. Also verifies
    that deleting the advertisement removes it cleanly.
  steps:
    - name: cleanup-stale
      try:
        - script:
            content: |
              kubectl delete bgppeers -l e2e-test=bgp-advertisement 2>/dev/null || true
              kubectl delete bgpadvertisement e2e-test-prefix 2>/dev/null || true
              echo "OK: stale resources cleaned up"

    - name: setup-peers
      try:
        - script:
            content: |
              set -e
              get_ipv6() {
                kubectl get node "$1" \
                  -o jsonpath='{range .status.addresses[?(@.type=="InternalIP")]}{.address}{"\n"}{end}' \
                  | grep ':' | head -1
              }
              W1=$(get_ipv6 bgp-e2e-worker)
              W2=$(get_ipv6 bgp-e2e-worker2)

              kubectl apply -f - <<EOF
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPPeer
              metadata:
                name: e2e-adv-w1-to-w2
                labels:
                  e2e-test: bgp-advertisement
              spec:
                instanceRef: default
                providerSelector:
                  matchLabels:
                    bgp.miloapis.com/node: bgp-e2e-worker
                    bgp.miloapis.com/daemon: GoBGP
                address: "${W2}"
                asNumber: 65000
                remotePort: 1790
                addressFamilies:
                  - afi: IPv6
                    safi: Unicast
                timers:
                  holdTime: 30
                  keepalive: 10
              ---
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPPeer
              metadata:
                name: e2e-adv-w2-to-w1
                labels:
                  e2e-test: bgp-advertisement
              spec:
                instanceRef: default
                providerSelector:
                  matchLabels:
                    bgp.miloapis.com/node: bgp-e2e-worker2
                    bgp.miloapis.com/daemon: GoBGP
                address: "${W1}"
                asNumber: 65000
                remotePort: 1790
                addressFamilies:
                  - afi: IPv6
                    safi: Unicast
                timers:
                  holdTime: 30
                  keepalive: 10
              EOF

    - name: create-bgp-advertisement
      try:
        - apply:
            resource:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPAdvertisement
              metadata:
                name: e2e-test-prefix
              spec:
                instanceRef: default
                prefixes:
                  - "2001:db8:e2e::/48"

    - name: assert-advertisement-accepted
      try:
        - assert:
            resource:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPAdvertisement
              metadata:
                name: e2e-test-prefix
              (metadata.name): e2e-test-prefix

    - name: delete-advertisement
      try:
        - delete:
            ref:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPAdvertisement
              name: e2e-test-prefix
        - script:
            content: |
              set -e
              ATTEMPTS=0
              while kubectl get bgpadvertisement e2e-test-prefix 2>/dev/null; do
                ATTEMPTS=$((ATTEMPTS+1))
                [ "$ATTEMPTS" -ge 30 ] && echo "ERROR: advertisement still exists" && exit 1
                sleep 2
              done
              echo "OK: BGPAdvertisement deleted"

      finally:
        - script:
            content: |
              kubectl delete bgppeers -l e2e-test=bgp-advertisement 2>/dev/null || true
