apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: bgp-advertisement
spec:
  description: >
    Verify that BGPAdvertisement resources inject prefixes into the GoBGP RIB
    and that withdrawal removes them. Requires at least one BGP session to be
    established so that RIB adjacency is available.
  steps:
    - name: setup-sessions
      try:
        - script:
            content: |
              set -e
              get_ipv6() {
                kubectl get node "$1" \
                  -o jsonpath='{range .status.addresses[?(@.type=="InternalIP")]}{.address}{"\n"}{end}' \
                  | grep ':' | head -1
              }
              W1=$(get_ipv6 bgp-e2e-worker)
              W2=$(get_ipv6 bgp-e2e-worker2)

              kubectl apply -f - <<EOF
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPSession
              metadata:
                name: e2e-adv-w1
                labels:
                  e2e-test: bgp-advertisement
              spec:
                fromProviderSelector:
                  matchLabels:
                    bgp.miloapis.com/node: bgp-e2e-worker
                    bgp.miloapis.com/daemon: GoBGP
                fromInstanceRef: default
                toPeers:
                  - address: "${W2}"
                    asNumber: 65000
                    instanceRef: default
                addressFamilies:
                  - afi: IPv6
                    safi: Unicast
                timers:
                  holdTime: 30
                  keepalive: 10
              ---
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPSession
              metadata:
                name: e2e-adv-w2
                labels:
                  e2e-test: bgp-advertisement
              spec:
                fromProviderSelector:
                  matchLabels:
                    bgp.miloapis.com/node: bgp-e2e-worker2
                    bgp.miloapis.com/daemon: GoBGP
                fromInstanceRef: default
                toPeers:
                  - address: "${W1}"
                    asNumber: 65000
                    instanceRef: default
                addressFamilies:
                  - afi: IPv6
                    safi: Unicast
                timers:
                  holdTime: 30
                  keepalive: 10
              EOF

    - name: wait-for-session-established
      try:
        - script:
            content: |
              set -e
              POD=$(kubectl -n bgp-system get pod \
                -l app.kubernetes.io/name=bgp \
                --field-selector spec.nodeName=bgp-e2e-worker \
                -o jsonpath='{.items[0].metadata.name}')
              echo "Waiting for GoBGP session in pod: $POD"

              ATTEMPTS=0
              ESTABLISHED=0
              while [ "$ESTABLISHED" -lt 1 ] && [ "$ATTEMPTS" -lt 60 ]; do
                ESTABLISHED=$(kubectl -n bgp-system exec "$POD" -c gobgpd -- \
                  gobgp neighbor 2>/dev/null | grep -c "Establ" || true)
                ATTEMPTS=$((ATTEMPTS+1))
                [ "$ESTABLISHED" -lt 1 ] && sleep 5
              done
              if [ "$ESTABLISHED" -lt 1 ]; then
                echo "ERROR: no BGP sessions reached Established"
                kubectl -n bgp-system exec "$POD" -c gobgpd -- gobgp neighbor || true
                exit 1
              fi
              echo "OK: BGP session Established"

    - name: create-bgp-advertisement
      try:
        - apply:
            resource:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPAdvertisement
              metadata:
                name: e2e-test-prefix
              spec:
                instanceRef: default
                prefixes:
                  - "2001:db8:e2e::/48"

    - name: assert-advertisement-active
      try:
        - script:
            content: |
              set -e
              ATTEMPTS=0
              ACTIVE=0
              while [ "$ACTIVE" -eq 0 ] && [ "$ATTEMPTS" -lt 30 ]; do
                PROVIDERS=$(kubectl get bgpadvertisement e2e-test-prefix \
                  -o jsonpath='{.status.providers}' 2>/dev/null || echo "")
                if [ -n "$PROVIDERS" ] && [ "$PROVIDERS" != "null" ] && [ "$PROVIDERS" != "[]" ]; then
                  ACTIVE=1
                fi
                ATTEMPTS=$((ATTEMPTS+1))
                [ "$ACTIVE" -eq 0 ] && sleep 5
              done
              if [ "$ACTIVE" -eq 0 ]; then
                echo "ERROR: BGPAdvertisement has no provider status after ${ATTEMPTS} attempts"
                kubectl get bgpadvertisement e2e-test-prefix -o yaml || true
                exit 1
              fi
              echo "OK: BGPAdvertisement provider status present"

    - name: assert-prefix-in-gobgp-rib
      try:
        - script:
            content: |
              set -e
              # Get any bgp pod name to exec into gobgpd
              POD=$(kubectl -n bgp-system get pod \
                -l app.kubernetes.io/name=bgp \
                -o jsonpath='{.items[0].metadata.name}')
              echo "Checking GoBGP RIB in pod: $POD"

              ATTEMPTS=0
              FOUND=0
              while [ "$FOUND" -eq 0 ] && [ "$ATTEMPTS" -lt 30 ]; do
                OUTPUT=$(kubectl -n bgp-system exec "$POD" -c gobgpd -- \
                  gobgp global rib -a ipv6 2>/dev/null || true)
                echo "$OUTPUT" | grep -q "2001:db8:e2e::" && FOUND=1 || true
                ATTEMPTS=$((ATTEMPTS+1))
                [ "$FOUND" -eq 0 ] && sleep 5
              done

              if [ "$FOUND" -eq 0 ]; then
                echo "ERROR: prefix 2001:db8:e2e::/48 not found in GoBGP RIB"
                kubectl -n bgp-system exec "$POD" -c gobgpd -- \
                  gobgp global rib -a ipv6 || true
                exit 1
              fi
              echo "OK: prefix 2001:db8:e2e::/48 found in GoBGP RIB"

    - name: delete-advertisement-and-verify-withdrawal
      try:
        - delete:
            ref:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPAdvertisement
              name: e2e-test-prefix
        - script:
            content: |
              set -e
              POD=$(kubectl -n bgp-system get pod \
                -l app.kubernetes.io/name=bgp \
                -o jsonpath='{.items[0].metadata.name}')
              echo "Verifying prefix withdrawn from GoBGP RIB in pod: $POD"

              ATTEMPTS=0
              STILL_PRESENT=1
              while [ "$STILL_PRESENT" -eq 1 ] && [ "$ATTEMPTS" -lt 30 ]; do
                OUTPUT=$(kubectl -n bgp-system exec "$POD" -c gobgpd -- \
                  gobgp global rib -a ipv6 2>/dev/null || true)
                echo "$OUTPUT" | grep -q "2001:db8:e2e::" && STILL_PRESENT=1 || STILL_PRESENT=0
                ATTEMPTS=$((ATTEMPTS+1))
                [ "$STILL_PRESENT" -eq 1 ] && sleep 5
              done

              if [ "$STILL_PRESENT" -eq 1 ]; then
                echo "ERROR: prefix 2001:db8:e2e::/48 still in GoBGP RIB after deletion"
                exit 1
              fi
              echo "OK: prefix 2001:db8:e2e::/48 withdrawn from GoBGP RIB"

      finally:
        - delete:
            ref:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPSession
              name: e2e-adv-w1
        - delete:
            ref:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPSession
              name: e2e-adv-w2
