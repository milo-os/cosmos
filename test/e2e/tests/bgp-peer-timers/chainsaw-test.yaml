apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: bgp-peer-timers
spec:
  description: >
    Verify that BGPPeer resources with explicit holdTime/keepaliveTime and without
    are both accepted by the API server and created correctly.
  steps:
    - name: cleanup-stale
      try:
        - script:
            content: |
              kubectl delete bgppeer e2e-timers-explicit e2e-timers-default 2>/dev/null || true
              kubectl delete configmap bgp-e2e-timer-ips 2>/dev/null || true
              echo "OK: stale resources cleaned up"

    - name: resolve-worker-ips
      try:
        - script:
            content: |
              set -e
              get_ipv6() {
                kubectl get node "$1" \
                  -o jsonpath='{range .status.addresses[?(@.type=="InternalIP")]}{.address}{"\n"}{end}' \
                  | grep ':' | head -1
              }
              W1=$(get_ipv6 bgp-e2e-worker)
              W2=$(get_ipv6 bgp-e2e-worker2)
              echo "worker1=${W1} worker2=${W2}"
              kubectl create configmap bgp-e2e-timer-ips \
                --from-literal=worker1="${W1}" \
                --from-literal=worker2="${W2}" \
                --dry-run=client -o yaml | kubectl apply -f -

    - name: create-peers
      try:
        - script:
            content: |
              set -e
              W2=$(kubectl get configmap bgp-e2e-timer-ips -o jsonpath='{.data.worker2}')

              kubectl apply -n "$NAMESPACE" -f - <<EOF
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPPeer
              metadata:
                name: e2e-timers-explicit
                labels:
                  e2e-test: bgp-peer-timers
              spec:
                routerRef:
                  name: bgp-e2e-worker
                address: "${W2}"
                peerASN: 65000
                addressFamilies:
                  - afi: ipv6
                    safi: unicast
                holdTime: 30s
                keepaliveTime: 10s
              ---
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPPeer
              metadata:
                name: e2e-timers-default
                labels:
                  e2e-test: bgp-peer-timers
              spec:
                routerRef:
                  name: bgp-e2e-worker
                address: "2001:db8::ffff"
                peerASN: 65000
                addressFamilies:
                  - afi: ipv6
                    safi: unicast
              EOF

    - name: assert-peers-created
      try:
        - assert:
            resource:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPPeer
              metadata:
                name: e2e-timers-explicit
              spec:
                holdTime: 30s
                keepaliveTime: 10s
        - assert:
            resource:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPPeer
              metadata:
                name: e2e-timers-default
              (spec.holdTime == null || spec.holdTime == ""): true

      finally:
        - delete:
            ref:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPPeer
              name: e2e-timers-explicit
        - delete:
            ref:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPPeer
              name: e2e-timers-default
        - delete:
            ref:
              apiVersion: v1
              kind: ConfigMap
              name: bgp-e2e-timer-ips
