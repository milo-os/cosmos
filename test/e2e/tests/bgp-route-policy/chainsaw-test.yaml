apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: bgp-route-policy
spec:
  description: >
    Verify that BGPRoutePolicy resources are accepted by the API server with valid
    conditions and that the operator reconciles them without error. Requires
    a peering session to be established for the policy to have effect.
  steps:
    - name: cleanup-stale
      try:
        - script:
            content: |
              kubectl delete bgpsession e2e-rp-w1 e2e-rp-w2 2>/dev/null || true
              kubectl delete bgproutepolicy e2e-export-filter 2>/dev/null || true
              echo "OK: stale resources cleaned up"

    - name: setup-sessions
      try:
        - script:
            content: |
              set -e
              get_ipv6() {
                kubectl get node "$1" \
                  -o jsonpath='{range .status.addresses[?(@.type=="InternalIP")]}{.address}{"\n"}{end}' \
                  | grep ':' | head -1
              }
              W1=$(get_ipv6 bgp-e2e-worker)
              W2=$(get_ipv6 bgp-e2e-worker2)

              kubectl apply -f - <<EOF
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPSession
              metadata:
                name: e2e-rp-w1
                labels:
                  e2e-test: bgp-route-policy
              spec:
                fromProviderSelector:
                  matchLabels:
                    bgp.miloapis.com/node: bgp-e2e-worker
                    bgp.miloapis.com/daemon: GoBGP
                fromInstanceRef: default
                toPeers:
                  - address: "${W2}"
                    asNumber: 65000
                    instanceRef: default
                addressFamilies:
                  - afi: IPv6
                    safi: Unicast
                timers:
                  holdTime: 30
                  keepalive: 10
              ---
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPSession
              metadata:
                name: e2e-rp-w2
                labels:
                  e2e-test: bgp-route-policy
              spec:
                fromProviderSelector:
                  matchLabels:
                    bgp.miloapis.com/node: bgp-e2e-worker2
                    bgp.miloapis.com/daemon: GoBGP
                fromInstanceRef: default
                toPeers:
                  - address: "${W1}"
                    asNumber: 65000
                    instanceRef: default
                addressFamilies:
                  - afi: IPv6
                    safi: Unicast
                timers:
                  holdTime: 30
                  keepalive: 10
              EOF

    - name: wait-for-session-established
      try:
        - script:
            content: |
              set -e
              POD=$(kubectl -n bgp-system get pod \
                -l app.kubernetes.io/name=bgp \
                --field-selector spec.nodeName=bgp-e2e-worker \
                -o jsonpath='{.items[0].metadata.name}')
              echo "Waiting for GoBGP session in pod: $POD"

              ATTEMPTS=0
              ESTABLISHED=0
              while [ "$ESTABLISHED" -lt 1 ] && [ "$ATTEMPTS" -lt 60 ]; do
                ESTABLISHED=$(kubectl -n bgp-system exec "$POD" -c gobgpd -- \
                  gobgp neighbor 2>/dev/null | grep -c "Establ" || true)
                ATTEMPTS=$((ATTEMPTS+1))
                [ "$ESTABLISHED" -lt 1 ] && sleep 5
              done
              if [ "$ESTABLISHED" -lt 1 ]; then
                echo "ERROR: no BGP sessions reached Established"
                kubectl -n bgp-system exec "$POD" -c gobgpd -- gobgp neighbor || true
                exit 1
              fi
              echo "OK: BGP session Established"

    - name: create-export-route-policy
      try:
        - apply:
            resource:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPRoutePolicy
              metadata:
                name: e2e-export-filter
              spec:
                instanceRef: default
                exportStatements:
                  - name: accept-2001-db8
                    conditions:
                      prefixSets:
                        - "2001:db8::/32"
                    actions:
                      routeDisposition: Accept
                  - name: reject-all
                    actions:
                      routeDisposition: Reject

    - name: assert-route-policy-applied
      try:
        - assert:
            resource:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPRoutePolicy
              metadata:
                name: e2e-export-filter
              # The resource should be accepted by the API server and have no
              # error conditions set by the operator.
              (metadata.name): e2e-export-filter

    - name: assert-no-error-condition
      try:
        - script:
            content: |
              set -e
              # Check per-provider conditions for error reasons (conditions live in
              # status.providers[*].conditions, not the top-level status.conditions).
              REASONS=$(kubectl get bgproutepolicy e2e-export-filter \
                -o jsonpath='{range .status.providers[*]}{range .conditions[*]}{.reason}{"\n"}{end}{end}' 2>/dev/null || echo "")
              if echo "$REASONS" | grep -qi "failed\|invalid\|error"; then
                echo "ERROR: unexpected error condition on BGPRoutePolicy"
                kubectl get bgproutepolicy e2e-export-filter -o yaml
                exit 1
              fi
              echo "OK: no error conditions on BGPRoutePolicy"

      finally:
        - delete:
            ref:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPRoutePolicy
              name: e2e-export-filter
        - delete:
            ref:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPSession
              name: e2e-rp-w1
        - delete:
            ref:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPSession
              name: e2e-rp-w2
