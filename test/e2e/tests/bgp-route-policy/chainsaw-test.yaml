apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: bgp-route-policy
spec:
  description: >
    Verify that BGPRoutePolicy resources are accepted by the API server with valid
    conditions. Creates a policy with an export direction and ordered terms, then
    asserts the resource is stored and no error conditions are present.
  steps:
    - name: cleanup-stale
      try:
        - script:
            content: |
              kubectl delete bgproutepolicy e2e-export-filter 2>/dev/null || true
              echo "OK: stale resources cleaned up"

    - name: create-export-route-policy
      try:
        - apply:
            resource:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPRoutePolicy
              metadata:
                name: e2e-export-filter
              spec:
                routerRef:
                  name: bgp-e2e-worker
                direction: export
                terms:
                  - sequence: 10
                    match:
                      addressFamilies:
                        - afi: ipv6
                          safi: unicast
                    action: permit
                    set:
                      communities:
                        add:
                          - "65000:100"
                  - sequence: 20
                    match:
                      any: true
                    action: deny

    - name: assert-route-policy-applied
      try:
        - assert:
            resource:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPRoutePolicy
              metadata:
                name: e2e-export-filter
              (metadata.name): e2e-export-filter

    - name: assert-no-error-condition
      try:
        - script:
            content: |
              set -e
              # Check top-level conditions for error reasons.
              REASONS=$(kubectl get bgproutepolicy e2e-export-filter \
                -o jsonpath='{range .status.conditions[*]}{.reason}{"\n"}{end}' 2>/dev/null || echo "")
              if echo "$REASONS" | grep -qi "failed\|invalid\|error"; then
                echo "ERROR: unexpected error condition on BGPRoutePolicy"
                kubectl get bgproutepolicy e2e-export-filter -o yaml
                exit 1
              fi
              echo "OK: no error conditions on BGPRoutePolicy"

      finally:
        - delete:
            ref:
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPRoutePolicy
              name: e2e-export-filter
