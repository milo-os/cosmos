apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: system-readiness
spec:
  description: Verify BGP system components are healthy before running functional tests
  steps:
    - name: bgp-daemonset-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: cosmos
                namespace: bgp-system
              status:
                (numberReady == desiredNumberScheduled): true

    - name: bgp-pods-ready
      try:
        - script:
            content: |
              set -e
              READY=$(kubectl -n bgp-system get pods \
                -l app.kubernetes.io/name=cosmos \
                -o jsonpath='{range .items[*]}{.status.containerStatuses[0].ready}{"\n"}{end}' \
                | grep -c "^true$" || true)
              if [ "$READY" -eq 0 ]; then
                echo "ERROR: no cosmos pods found with the cosmos-operator container ready"
                exit 1
              fi
              echo "OK: $READY bgp pod(s) ready"

    - name: gobgpd-pods-ready
      try:
        - script:
            content: |
              set -e
              READY=$(kubectl -n bgp-system get pods \
                -l app.kubernetes.io/name=gobgpd \
                -o jsonpath='{range .items[*]}{.status.containerStatuses[0].ready}{"\n"}{end}' \
                | grep -c "^true$" || true)
              if [ "$READY" -eq 0 ]; then
                echo "ERROR: no gobgpd pods found ready"
                exit 1
              fi
              echo "OK: $READY gobgpd pod(s) ready"

    - name: crds-established
      try:
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: bgpinstances.bgp.miloapis.com
              status:
                (conditions[?type=='Established'].status | [0]): "True"
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: bgpadvertisements.bgp.miloapis.com
              status:
                (conditions[?type=='Established'].status | [0]): "True"
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: bgpsessions.bgp.miloapis.com
              status:
                (conditions[?type=='Established'].status | [0]): "True"
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: bgproutepolicies.bgp.miloapis.com
              status:
                (conditions[?type=='Established'].status | [0]): "True"
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: bgpexternalpeers.bgp.miloapis.com
              status:
                (conditions[?type=='Established'].status | [0]): "True"
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: bgppeers.bgp.miloapis.com
              status:
                (conditions[?type=='Established'].status | [0]): "True"
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: bgpproviders.providers.bgp.miloapis.com
              status:
                (conditions[?type=='Established'].status | [0]): "True"
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: vpcs.vpc.miloapis.com
              status:
                (conditions[?type=='Established'].status | [0]): "True"
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: vpcattachments.vpc.miloapis.com
              status:
                (conditions[?type=='Established'].status | [0]): "True"

    - name: bgp-providers-ready
      try:
        # One BGPProvider per worker node is applied by the deploy step.
        # Wait for all 3 to report Ready=True (daemon health probe passed).
        - script:
            content: |
              set -e
              ATTEMPTS=0
              COUNT=0
              while [ "$COUNT" -lt 3 ] && [ "$ATTEMPTS" -lt 30 ]; do
                COUNT=$(kubectl get bgpproviders \
                  -l bgp.miloapis.com/daemon=GoBGP \
                  -o jsonpath='{range .items[*]}{.status.conditions[?(@.type=="Ready")].status}{"\n"}{end}' \
                  2>/dev/null | grep -c "^True$" || true)
                ATTEMPTS=$((ATTEMPTS+1))
                [ "$COUNT" -lt 3 ] && sleep 2
              done
              if [ "$COUNT" -lt 3 ]; then
                echo "ERROR: only $COUNT/3 GoBGP BGPProviders are Ready after ${ATTEMPTS} attempts"
                kubectl get bgpproviders -o wide || true
                exit 1
              fi
              echo "OK: $COUNT GoBGP BGPProviders Ready"
