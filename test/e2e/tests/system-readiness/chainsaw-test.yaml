apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: system-readiness
spec:
  description: Verify BGP system components are healthy before running functional tests
  steps:
    - name: crds-established
      try:
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: bgprouters.bgp.miloapis.com
              status:
                (conditions[?type=='Established'].status | [0]): "True"
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: bgpadvertisements.bgp.miloapis.com
              status:
                (conditions[?type=='Established'].status | [0]): "True"
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: bgppolicies.bgp.miloapis.com
              status:
                (conditions[?type=='Established'].status | [0]): "True"
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: bgppeers.bgp.miloapis.com
              status:
                (conditions[?type=='Established'].status | [0]): "True"
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: bgpvrfinstances.bgp.miloapis.com
              status:
                (conditions[?type=='Established'].status | [0]): "True"
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: vpcs.vpc.miloapis.com
              status:
                (conditions[?type=='Established'].status | [0]): "True"
        - assert:
            resource:
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: vpcattachments.vpc.miloapis.com
              status:
                (conditions[?type=='Established'].status | [0]): "True"
