apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: bgp-status-conditions
spec:
  description: >
    Verify BGPPeer CRD schema validation — valid resources are accepted and
    invalid resources are rejected by the API server without a running controller.

  steps:
    - name: cleanup-stale
      try:
        - script:
            content: |
              kubectl delete bgppeer \
                e2e-cond-peer-valid \
                e2e-cond-peer-bad-afi \
                e2e-cond-peer-bad-safi \
                2>/dev/null || true
              echo "OK: stale resources cleaned up"

    - name: accept-valid-peer
      description: >
        A BGPPeer with a valid routerRef, valid address, and valid AFI/SAFI
        should be accepted by the API server.
      try:
        - script:
            content: |
              set -e
              kubectl apply -f - <<EOF
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPPeer
              metadata:
                name: e2e-cond-peer-valid
              spec:
                routerRef:
                  name: router-does-not-exist
                address: "2001:db8:e2e:c001::1"
                peerASN: 65099
                addressFamilies:
                  - afi: ipv6
                    safi: unicast
              EOF
              kubectl get bgppeer e2e-cond-peer-valid
              echo "OK: valid BGPPeer accepted by API server"

      finally:
        - script:
            content: |
              kubectl delete bgppeer e2e-cond-peer-valid 2>/dev/null || true

    - name: reject-invalid-afi-safi
      description: >
        A BGPPeer with an invalid AFI/SAFI combination (ipv4/evpn) must be
        rejected by the API server CEL validation.
      try:
        - script:
            content: |
              set +e
              OUTPUT=$(kubectl apply -f - 2>&1 <<'EOF'
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPPeer
              metadata:
                name: e2e-cond-peer-bad-afi
              spec:
                routerRef:
                  name: router-does-not-exist
                address: "2001:db8::1"
                peerASN: 65099
                addressFamilies:
                  - afi: ipv4
                    safi: evpn
              EOF
              )
              EXIT=$?
              set -e
              if [ "$EXIT" -eq 0 ]; then
                echo "ERROR: expected rejection of ipv4/evpn AFI/SAFI but resource was accepted"
                kubectl delete bgppeer e2e-cond-peer-bad-afi 2>/dev/null || true
                exit 1
              fi
              echo "OK: invalid ipv4/evpn AFI/SAFI correctly rejected"
              echo "Server response: $OUTPUT"

    - name: reject-l2vpn-unicast
      description: >
        A BGPPeer with l2vpn/unicast (invalid combination) must be rejected.
      try:
        - script:
            content: |
              set +e
              OUTPUT=$(kubectl apply -f - 2>&1 <<'EOF'
              apiVersion: bgp.miloapis.com/v1alpha1
              kind: BGPPeer
              metadata:
                name: e2e-cond-peer-bad-safi
              spec:
                routerRef:
                  name: router-does-not-exist
                address: "2001:db8::1"
                peerASN: 65099
                addressFamilies:
                  - afi: l2vpn
                    safi: unicast
              EOF
              )
              EXIT=$?
              set -e
              if [ "$EXIT" -eq 0 ]; then
                echo "ERROR: expected rejection of l2vpn/unicast AFI/SAFI but resource was accepted"
                kubectl delete bgppeer e2e-cond-peer-bad-safi 2>/dev/null || true
                exit 1
              fi
              echo "OK: invalid l2vpn/unicast AFI/SAFI correctly rejected"
              echo "Server response: $OUTPUT"
