apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: bgp-e2e
nodes:
  - role: control-plane
  - role: worker
    labels:
      topology.kubernetes.io/region: region1
  - role: worker
    labels:
      topology.kubernetes.io/region: region2
  - role: worker
    labels:
      topology.kubernetes.io/region: region3
networking:
  disableDefaultCNI: true
  ipFamily: dual
