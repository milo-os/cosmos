apiVersion: v1
kind: ConfigMap
metadata:
  name: cosmos-config
  namespace: cosmos-system
data:
  # clusterRole controls which reconcilers are active on this node.
  # Valid values: pop, infra, management.
  # pop and infra: ProviderReconciler, InstanceReconciler, PeerReconciler,
  #   AdvertisementReconciler, RoutePolicyReconciler, SessionReconciler.
  # management: SessionReconciler, ExternalPeerReconciler.
  # SessionReconciler is active in all roles.
  clusterRole: pop
