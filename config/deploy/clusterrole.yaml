apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bgp-operator
rules:
  # Nodes: resolve IPv6 addresses for router-id computation.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Secrets: read BGP session passwords referenced by BGPPeer.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  # BGPProvider: full management — operator bootstraps and reconciles providers.
  - apiGroups: ["providers.bgp.miloapis.com"]
    resources: ["bgpproviders"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["providers.bgp.miloapis.com"]
    resources: ["bgpproviders/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["providers.bgp.miloapis.com"]
    resources: ["bgpproviders/finalizers"]
    verbs: ["update"]
  # BGPInstance: full management.
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgpinstances"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgpinstances/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgpinstances/finalizers"]
    verbs: ["update"]
  # BGPPeer: full management.
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgppeers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgppeers/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgppeers/finalizers"]
    verbs: ["update"]
  # BGPExternalPeer: full management.
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgpexternalpeers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgpexternalpeers/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgpexternalpeers/finalizers"]
    verbs: ["update"]
  # BGPAdvertisement: full management.
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgpadvertisements"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgpadvertisements/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgpadvertisements/finalizers"]
    verbs: ["update"]
  # BGPRoutePolicy: full management.
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgproutepolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgproutepolicies/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgproutepolicies/finalizers"]
    verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bgp-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bgp-operator
subjects:
  - kind: ServiceAccount
    name: bgp-operator
    namespace: bgp-system
