apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: bgp
  namespace: bgp-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: bgp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bgp
    spec:
      serviceAccountName: bgp-operator
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      hostNetwork: true
      containers:
        - name: bgp
          image: ghcr.io/milo-os/cosmos:latest
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-addr=:8086
            - --health-addr=:8087
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: LOCAL_ENDPOINT
              value: ""  # Must be set by overlay (e.g., "node-$(NODE_NAME)")
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_ADMIN
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8087
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8087
            initialDelaySeconds: 5
            periodSeconds: 10
      tolerations:
        - operator: Exists
