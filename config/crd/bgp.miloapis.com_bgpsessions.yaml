---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: bgpsessions.bgp.miloapis.com
spec:
  group: bgp.miloapis.com
  names:
    kind: BGPSession
    listKind: BGPSessionList
    plural: bgpsessions
    shortNames:
    - bgpsess
    singular: bgpsession
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.localEndpoint
      name: Local
      type: string
    - jsonPath: .spec.remoteEndpoint
      name: Remote
      type: string
    - jsonPath: .status.conditions[?(@.type=="Configured")].status
      name: Configured
      type: string
    - jsonPath: .status.conditions[?(@.type=="SessionEstablished")].status
      name: Established
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BGPSession declares a BGP peering relationship between two BGPEndpoints.
          Sessions are created by BGPPeeringPolicy controllers or manually by platform operators.
          Each node's BGP controller reconciles all BGPSession resources into GoBGP AddPeer calls.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BGPSessionSpec declares a peering relationship between two
              BGPEndpoints.
            properties:
              ebgpConfig:
                description: |-
                  EBGPConfig holds eBGP-specific session parameters.
                  Only meaningful when the local and remote endpoints have different AS numbers.
                properties:
                  multiHop:
                    description: MultiHop enables eBGP multi-hop when the peers are
                      not directly connected.
                    properties:
                      ttl:
                        description: TTL is the maximum number of hops permitted (1–255).
                        format: int32
                        maximum: 255
                        minimum: 1
                        type: integer
                    required:
                    - ttl
                    type: object
                  ttlSecurity:
                    description: TTLSecurity enables GTSM for this eBGP session.
                    properties:
                      ttl:
                        description: TTL is the expected minimum TTL for incoming
                          eBGP packets.
                        format: int32
                        maximum: 255
                        minimum: 1
                        type: integer
                    required:
                    - ttl
                    type: object
                type: object
              holdTime:
                default: 90
                description: HoldTime is the BGP hold time in seconds. Defaults to
                  90.
                format: int32
                minimum: 3
                type: integer
              keepaliveTime:
                default: 30
                description: KeepaliveTime is the BGP keepalive interval in seconds.
                  Defaults to 30.
                format: int32
                minimum: 1
                type: integer
              localEndpoint:
                description: LocalEndpoint references the local BGPEndpoint by name.
                type: string
              remoteEndpoint:
                description: RemoteEndpoint references the remote BGPEndpoint by name.
                type: string
              routeReflector:
                description: |-
                  RouteReflector configures this session for route reflector client behavior.
                  When set, the local speaker treats the remote peer as a route reflector client.
                properties:
                  clusterID:
                    description: ClusterID is the route reflector cluster ID.
                    type: string
                required:
                - clusterID
                type: object
            required:
            - localEndpoint
            - remoteEndpoint
            type: object
          status:
            description: |-
              BGPSessionStatus reflects the observed BGP session state.
              Operational counters (session state, received/advertised prefixes, flap count)
              are exposed as Prometheus metrics rather than CRD status fields to avoid
              high-frequency status writes from polling loops.
            properties:
              conditions:
                description: Conditions describe the current state of the session.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
