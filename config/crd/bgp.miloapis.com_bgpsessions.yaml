---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: bgpsessions.bgp.miloapis.com
spec:
  group: bgp.miloapis.com
  names:
    kind: BGPSession
    listKind: BGPSessionList
    plural: bgpsessions
    shortNames:
    - bgps
    singular: bgpsession
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BGPSession expresses bilateral BGP session intent.
          Written by the management cluster cosmos. Propagated by Karmada to member clusters.
          The receiving cluster's SessionReconciler generates BGPPeer resources locally.
          Self-contained: toPeers carries explicit resolved addresses, no cross-cluster lookups at reconcile time.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BGPSessionSpec defines the desired session state.
            properties:
              addressFamilies:
                description: AddressFamilies are passed through to generated BGPPeer
                  resources.
                items:
                  description: AddressFamily represents a BGP address family (AFI/SAFI
                    pair).
                  properties:
                    afi:
                      description: AFI is the Address Family Identifier.
                      enum:
                      - IPv4
                      - IPv6
                      type: string
                    safi:
                      description: SAFI is the Subsequent Address Family Identifier.
                      enum:
                      - Unicast
                      - VPNUnicast
                      type: string
                  required:
                  - afi
                  - safi
                  type: object
                minItems: 1
                type: array
              allowAsIn:
                description: AllowAsIn is passed through to generated BGPPeer resources.
                format: int32
                maximum: 10
                minimum: 1
                type: integer
              fromExternalPeerRef:
                description: |-
                  FromExternalPeerRef names a BGPExternalPeer resource representing the from-side.
                  No BGPPeer is generated on this side.
                  Mutually exclusive with fromProviderSelector.
                properties:
                  name:
                    description: Name is the BGPExternalPeer resource name.
                    type: string
                required:
                - name
                type: object
              fromInstanceRef:
                description: |-
                  FromInstanceRef is the BGPInstance name to use for generated BGPPeer resources.
                  Required when fromProviderSelector is set.
                type: string
              fromProviderSelector:
                description: |-
                  FromProviderSelector selects local BGPProvider resources representing the from-side of the session.
                  Mutually exclusive with fromExternalPeerRef.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              timers:
                description: Timers override the instance timer defaults for generated
                  peers.
                properties:
                  holdTime:
                    description: HoldTime overrides the instance default hold time.
                    format: int32
                    minimum: 3
                    type: integer
                  keepalive:
                    description: Keepalive overrides the instance default keepalive
                      interval.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              toPeers:
                description: |-
                  ToPeers is the explicit list of peer addresses for the to-side of the session.
                  Resolved by management cluster cosmos at session write time.
                  The receiving cluster uses these directly without cross-cluster lookups.
                  Required when fromProviderSelector is set.
                items:
                  description: |-
                    SessionPeer is one entry in the toPeers list.
                    Resolved from BGPProvider or BGPExternalPeer resources at session write time.
                  properties:
                    address:
                      description: Address is the explicit peer address.
                      format: ipv6
                      type: string
                    asNumber:
                      description: ASNumber is the peer's autonomous system number.
                      format: int64
                      maximum: 4294967295
                      minimum: 1
                      type: integer
                    instanceRef:
                      description: InstanceRef is the BGPInstance name in this cluster
                        to use for the generated BGPPeer.
                      type: string
                    routeReflectorClient:
                      description: |-
                        RouteReflectorClient designates this peer as an RR client on the generated BGPPeer.
                        Set by management cluster cosmos when the to-side is an RR client designation.
                      type: boolean
                  required:
                  - address
                  - asNumber
                  - instanceRef
                  type: object
                type: array
            required:
            - addressFamilies
            type: object
            x-kubernetes-validations:
            - message: exactly one of fromProviderSelector or fromExternalPeerRef
                must be set
              rule: has(self.fromProviderSelector) != has(self.fromExternalPeerRef)
            - message: fromInstanceRef and toPeers are required when fromProviderSelector
                is set
              rule: '!has(self.fromProviderSelector) || (has(self.fromInstanceRef)
                && has(self.toPeers))'
            - message: at least one address family must be specified
              rule: self.addressFamilies.size() > 0
          status:
            description: BGPSessionStatus defines the observed state of BGPSession.
            properties:
              conditions:
                description: Conditions reflect the current reconciliation state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              fromSide:
                description: FromSide summarizes the from-side reconciliation.
                properties:
                  generatedPeers:
                    description: GeneratedPeers is the count of BGPPeer resources
                      generated.
                    format: int32
                    type: integer
                  matchedProviders:
                    description: MatchedProviders is the count of local BGPProvider
                      resources matched by fromProviderSelector.
                    format: int32
                    type: integer
                required:
                - generatedPeers
                - matchedProviders
                type: object
              toSide:
                description: ToSide summarizes the to-side peer list.
                properties:
                  peerCount:
                    description: PeerCount is the number of entries in spec.toPeers.
                    format: int32
                    type: integer
                required:
                - peerCount
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
