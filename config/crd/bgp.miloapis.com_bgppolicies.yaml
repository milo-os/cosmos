---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: bgppolicies.bgp.miloapis.com
spec:
  group: bgp.miloapis.com
  names:
    kind: BGPPolicy
    listKind: BGPPolicyList
    plural: bgppolicies
    shortNames:
    - bgpp
    singular: bgppolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.direction
      name: DIRECTION
      type: string
    - jsonPath: .spec.terms
      name: TERMS
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BGPPolicy defines composable, ordered routing policy statements applied to a
          BGPRouter in a specific direction (import or export). It binds to one or more
          BGPRouter instances via routerRef or routerSelector.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BGPPolicySpec defines the desired route policy state.
            properties:
              direction:
                allOf:
                - enum:
                  - import
                  - export
                - enum:
                  - import
                  - export
                description: 'Direction is the policy direction: import or export.'
                type: string
              routerRef:
                description: |-
                  RouterRef targets a single BGPRouter by name.
                  Mutually exclusive with routerSelector.
                properties:
                  name:
                    description: Name is the name of the BGPRouter.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              routerSelector:
                description: |-
                  RouterSelector targets one or more BGPRouters by label.
                  Mutually exclusive with routerRef.
                properties:
                  matchExpressions:
                    description: MatchExpressions is a list of label selector requirements.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: MatchLabels is a map of key/value label pairs to
                      match.
                    type: object
                type: object
              terms:
                description: |-
                  Terms is the ordered list of policy statements.
                  Evaluated from lowest to highest sequence number.
                items:
                  description: BGPPolicyTerm is a single ordered policy statement
                    with match conditions and an action.
                  properties:
                    action:
                      allOf:
                      - enum:
                        - permit
                        - deny
                      - enum:
                        - permit
                        - deny
                      description: Action is the disposition when this term matches.
                      type: string
                    match:
                      description: Match defines the conditions under which this term
                        fires.
                      properties:
                        addressFamilies:
                          description: |-
                            AddressFamilies constrains the match to specific AFI/SAFI combinations.
                            If empty, all address families are matched.
                          items:
                            description: |-
                              AddressFamily is a BGP address family expressed as an AFI/SAFI pair.
                              Valid combinations: ipv4/unicast, ipv6/unicast, l2vpn/evpn.
                            properties:
                              afi:
                                description: AFI is the address family indicator.
                                enum:
                                - ipv4
                                - ipv6
                                - l2vpn
                                type: string
                              safi:
                                description: SAFI is the subsequent address family
                                  indicator.
                                enum:
                                - unicast
                                - evpn
                                type: string
                            required:
                            - afi
                            - safi
                            type: object
                            x-kubernetes-validations:
                            - message: IPv4 only supports unicast SAFI
                              rule: 'self.afi == ''ipv4'' ? self.safi == ''unicast''
                                : true'
                            - message: IPv6 only supports unicast SAFI
                              rule: 'self.afi == ''ipv6'' ? self.safi == ''unicast''
                                : true'
                            - message: L2VPN only supports evpn SAFI
                              rule: 'self.afi == ''l2vpn'' ? self.safi == ''evpn''
                                : true'
                          maxItems: 8
                          type: array
                        any:
                          description: Any matches all routes. When true, all other
                            match fields are ignored.
                          type: boolean
                      type: object
                    sequence:
                      description: |-
                        Sequence is the evaluation order. Lower values are evaluated first.
                        Must be unique within the policy.
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                    set:
                      description: |-
                        Set defines mutations applied when action is "permit".
                        Must not be set when action is "deny".
                      properties:
                        communities:
                          description: Communities defines community add/remove operations.
                          properties:
                            add:
                              description: Add is a list of communities to attach.
                              items:
                                maxLength: 24
                                type: string
                              maxItems: 32
                              type: array
                            remove:
                              description: Remove is a list of communities to strip.
                              items:
                                maxLength: 24
                                type: string
                              maxItems: 32
                              type: array
                          type: object
                        localPreference:
                          description: |-
                            LocalPreference sets the LOCAL_PREF attribute.
                            Only meaningful on import (iBGP) or export to iBGP peers.
                          format: int32
                          maximum: 4294967295
                          minimum: 0
                          type: integer
                      type: object
                  required:
                  - action
                  - match
                  - sequence
                  type: object
                  x-kubernetes-validations:
                  - message: set actions are not permitted on deny terms
                    rule: 'self.action == ''deny'' ? !has(self.set) : true'
                maxItems: 32
                minItems: 1
                type: array
            required:
            - direction
            - terms
            type: object
            x-kubernetes-validations:
            - message: Term sequence numbers must be unique
              rule: self.terms.all(t1, self.terms.filter(t2, t2.sequence == t1.sequence).size()
                == 1)
            - message: Exactly one of routerRef or routerSelector must be set
              rule: has(self.routerRef) != has(self.routerSelector)
          status:
            description: BGPPolicyStatus defines the observed state of BGPPolicy.
            properties:
              conditions:
                description: Conditions contains the standard conditions for this
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation this status
                  was computed from.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
