---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: bgpproviders.providers.bgp.miloapis.com
spec:
  group: providers.bgp.miloapis.com
  names:
    kind: BGPProvider
    listKind: BGPProviderList
    plural: bgpproviders
    shortNames:
    - bgpp
    singular: bgpprovider
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BGPProvider represents one instance of a BGP daemon process that cosmos can configure.
          It carries the daemon type, endpoint, capabilities, and node binding via labels.
          Auto-bootstrapped at controller startup for local daemons.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BGPProviderSpec defines the desired state of BGPProvider.
            properties:
              frr:
                description: |-
                  FRR contains FRR northbound gRPC configuration.
                  Required when type is FRR.
                properties:
                  endpoint:
                    default: localhost:50051
                    description: |-
                      Endpoint is the gRPC endpoint for the FRR northbound API.
                      In v1alpha1 only loopback addresses are accepted.
                    type: string
                type: object
              gobgp:
                description: |-
                  GoBGP contains GoBGP gRPC configuration.
                  Required when type is GoBGP.
                properties:
                  endpoint:
                    default: localhost:50051
                    description: |-
                      Endpoint is the gRPC endpoint for the GoBGP API.
                      In v1alpha1 only loopback addresses are accepted.
                    type: string
                type: object
              type:
                description: Type is the BGP daemon type. Must match the set daemon
                  block.
                enum:
                - FRR
                - GoBGP
                type: string
            required:
            - type
            type: object
            x-kubernetes-validations:
            - message: exactly one of frr or gobgp must be set
              rule: has(self.frr) != has(self.gobgp)
            - message: type must match the set daemon block
              rule: 'self.type == ''FRR'' ? has(self.frr) : has(self.gobgp)'
          status:
            description: BGPProviderStatus defines the observed state of BGPProvider.
            properties:
              capabilities:
                description: |-
                  Capabilities is the self-reported capability set.
                  Populated by cosmos at reconcile time from compile-time constants in v1alpha1.
                properties:
                  addressFamilies:
                    description: AddressFamilies lists the AFI/SAFI combinations supported.
                    items:
                      description: AddressFamilyCapability represents a supported
                        AFI/SAFI combination.
                      properties:
                        afi:
                          description: AFI is the Address Family Identifier.
                          enum:
                          - IPv4
                          - IPv6
                          type: string
                        safi:
                          description: SAFI is the Subsequent Address Family Identifier.
                          enum:
                          - Unicast
                          - VPNUnicast
                          type: string
                      required:
                      - afi
                      - safi
                      type: object
                    type: array
                  bfd:
                    description: BFD indicates whether the daemon supports BFD.
                    type: boolean
                  routeReflection:
                    description: RouteReflection indicates whether the daemon supports
                      route reflector operation.
                    type: boolean
                required:
                - bfd
                - routeReflection
                type: object
              conditions:
                description: Conditions reflect the current state of the BGPProvider.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              daemon:
                description: Daemon is the daemon type of this provider.
                type: string
              resolvedEndpoint:
                description: ResolvedEndpoint is the endpoint currently in use.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
