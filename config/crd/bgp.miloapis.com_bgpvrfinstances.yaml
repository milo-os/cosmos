              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BGPVRFInstanceSpec defines the desired VRF configuration.
            properties:
              exportRouteTargets:
                description: |-
                  ExportRouteTargets is the list of BGP extended community route targets
                  attached to routes exported from this VRF.
                  Format per entry: "ASN:NN" or "IP:NN".
                items:
                  description: RouteTarget is a BGP extended community in "ASN:NN"
                    or "IP:NN" format.
                  properties:
                    value:
                      description: |-
                        Value is the route target extended community string.
                        Format: "ASN:NN" (e.g. "65000:100") or "IP:NN" (e.g. "192.0.2.1:100").
                      minLength: 1
                      type: string
                  required:
                  - value
                  type: object
                  x-kubernetes-validations:
                  - message: value must be in ASN:NN or IP:NN format
                    rule: self.value.matches('^([0-9]+[.][0-9]+[.][0-9]+[.][0-9]+|[0-9]+):[0-9]+$')
                minItems: 1
                type: array
              importRouteTargets:
                description: |-
                  ImportRouteTargets is the list of BGP extended community route targets
                  used to import routes into this VRF.
                  Format per entry: "ASN:NN" or "IP:NN".
                items:
                  description: RouteTarget is a BGP extended community in "ASN:NN"
                    or "IP:NN" format.
                  properties:
