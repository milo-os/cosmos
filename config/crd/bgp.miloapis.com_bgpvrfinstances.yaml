                    rule: self.value.matches('^([0-9]{1,3}[.][0-9]{1,3}[.][0-9]{1,3}[.][0-9]{1,3}|[0-9]{1,10}):[0-9]{1,10}$')
                maxItems: 32
                minItems: 1
                type: array
              importRouteTargets:
                description: |-
                  ImportRouteTargets is the list of BGP extended community route targets
                  used to import routes into this VRF.
                items:
                  description: RouteTarget is a BGP extended community in "ASN:NN"
                    or "IP:NN" format.
                  properties:
                    value:
