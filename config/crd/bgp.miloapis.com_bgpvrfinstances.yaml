                        actually applied.
                      properties:
                        address:
                          description: Address is the peer address (BGPPeer only).
                          type: string
                        addressFamilies:
                          description: AddressFamilies configured.
                          items:
                            description: |-
                              AddressFamily is a BGP address family expressed as an AFI/SAFI pair.
                              Valid combinations: ipv4/unicast, ipv6/unicast, l2vpn/evpn.
                            properties:
                              afi:
                                description: AFI is the address family indicator.
                                enum:
                                - ipv4
                                - ipv6
                                - l2vpn
                                type: string
                              safi:
                                description: SAFI is the subsequent address family
