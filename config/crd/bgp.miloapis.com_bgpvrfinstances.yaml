---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: bgpvrfinstances.bgp.miloapis.com
spec:
  group: bgp.miloapis.com
  names:
    kind: BGPVRFInstance
    listKind: BGPVRFInstanceList
    plural: bgpvrfinstances
    shortNames:
    - bgpvrf
    singular: bgpvrfinstance
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.routeDistinguisher
      name: RD
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BGPVRFInstance configures an L2VPN EVPN VRF on matched BGPRouters.
          The referenced BGPRouter must have l2vpn-evpn in its addressFamilies.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BGPVRFInstanceSpec defines the desired VRF configuration.
            properties:
              exportRouteTargets:
                description: |-
                  ExportRouteTargets is the list of BGP extended community route targets
                  attached to routes exported from this VRF.
                items:
                  description: RouteTarget is a BGP extended community in "ASN:NN"
                    or "IP:NN" format.
                  properties:
                    value:
                      description: |-
                        Value is the route target extended community string.
                        Format: "ASN:NN" (e.g. "65000:100") or "IP:NN" (e.g. "192.0.2.1:100").
                      maxLength: 21
                      minLength: 1
                      type: string
                  required:
                  - value
                  type: object
                  x-kubernetes-validations:
                  - message: value must be in ASN:NN or IP:NN format
                    rule: self.value.matches('^([0-9]{1,9}[.][0-9]{1,9}[.][0-9]{1,9}[.][0-9]{1,9}|[0-9]{1,9}):[0-9]{1,9}$')
                maxItems: 32
                minItems: 1
                type: array
              importRouteTargets:
                description: |-
                  ImportRouteTargets is the list of BGP extended community route targets
                  used to import routes into this VRF.
                items:
                  description: RouteTarget is a BGP extended community in "ASN:NN"
                    or "IP:NN" format.
                  properties:
                    value:
                      description: |-
                        Value is the route target extended community string.
                        Format: "ASN:NN" (e.g. "65000:100") or "IP:NN" (e.g. "192.0.2.1:100").
                      maxLength: 21
                      minLength: 1
                      type: string
                  required:
                  - value
                  type: object
                  x-kubernetes-validations:
                  - message: value must be in ASN:NN or IP:NN format
                    rule: self.value.matches('^([0-9]{1,9}[.][0-9]{1,9}[.][0-9]{1,9}[.][0-9]{1,9}|[0-9]{1,9}):[0-9]{1,9}$')
                maxItems: 32
                minItems: 1
                type: array
              routeDistinguisher:
                description: |-
                  RouteDistinguisher uniquely identifies this VRF in the BGP control plane.
                  Format: "ASN:NN" (e.g. "65000:100") or "IP:NN" (e.g. "192.0.2.1:100").
                maxLength: 21
                minLength: 1
                type: string
              routerRef:
                description: |-
                  RouterRef targets a single BGPRouter by name.
                  Mutually exclusive with routerSelector.
                properties:
                  name:
                    description: Name is the name of the BGPRouter.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              routerSelector:
                description: |-
                  RouterSelector targets one or more BGPRouters by label.
                  Mutually exclusive with routerRef.
                properties:
                  matchExpressions:
                    description: MatchExpressions is a list of label selector requirements.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: MatchLabels is a map of key/value label pairs to
                      match.
                    type: object
                type: object
            required:
            - exportRouteTargets
            - importRouteTargets
            - routeDistinguisher
            type: object
            x-kubernetes-validations:
            - message: routeDistinguisher must be in ASN:NN or IP:NN format
              rule: self.routeDistinguisher.matches('^([0-9]{1,9}[.][0-9]{1,9}[.][0-9]{1,9}[.][0-9]{1,9}|[0-9]{1,9}):[0-9]{1,9}$')
            - message: Exactly one of routerRef or routerSelector must be set
              rule: has(self.routerRef) != has(self.routerSelector)
          status:
            description: BGPVRFInstanceStatus defines the observed state of BGPVRFInstance.
            properties:
              conditions:
                description: Conditions are top-level conditions for this BGPVRFInstance.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              evpnRouteCount:
                description: EVPNRouteCount is the per-route-type count of active
                  EVPN routes in this VRF.
                items:
                  description: EVPNRouteCounter is a per-route-type EVPN route count
                    reported in BGPVRFInstance status.
                  properties:
                    count:
                      description: Count is the number of active routes of this type.
                      format: int64
                      minimum: 0
                      type: integer
                    routeType:
                      description: RouteType is the EVPN BGP route type.
                      enum:
                      - InclusiveMulticastEthernetTag
                      - MACIPAdvertisement
                      - IPPrefixAdvertisement
                      - StickyMACAddress
                      - IPv6PrefixAdvertisement
                      type: string
                  required:
                  - count
                  - routeType
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - routeType
                x-kubernetes-list-type: map
              routers:
                description: Routers holds per-router reconciliation status.
                items:
                  description: RouterStatus holds per-router reconciliation status
                    used by BGPVRFInstance.
                  properties:
                    conditions:
                      description: Conditions are the per-router conditions.
                      items:
                        description: Condition contains details for one aspect of
                          the current state of this API Resource.
                        properties:
                          lastTransitionTime:
                            description: |-
                              lastTransitionTime is the last time the condition transitioned from one status to another.
                              This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                            format: date-time
                            type: string
                          message:
                            description: |-
                              message is a human readable message indicating details about the transition.
                              This may be an empty string.
                            maxLength: 32768
                            type: string
                          observedGeneration:
                            description: |-
                              observedGeneration represents the .metadata.generation that the condition was set based upon.
                              For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                              with respect to the current state of the instance.
                            format: int64
                            minimum: 0
                            type: integer
                          reason:
                            description: |-
                              reason contains a programmatic identifier indicating the reason for the condition's last transition.
                              Producers of specific condition types may define expected values and meanings for this field,
                              and whether the values are considered a guaranteed API.
                              The value should be a CamelCase string.
                              This field may not be empty.
                            maxLength: 1024
                            minLength: 1
                            pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                            type: string
                          status:
                            description: status of the condition, one of True, False,
                              Unknown.
                            enum:
                            - "True"
                            - "False"
                            - Unknown
                            type: string
                          type:
                            description: type of condition in CamelCase or in foo.example.com/CamelCase.
                            maxLength: 316
                            pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                            type: string
                        required:
                        - lastTransitionTime
                        - message
                        - reason
                        - status
                        - type
                        type: object
                      type: array
                      x-kubernetes-list-map-keys:
                      - type
                      x-kubernetes-list-type: map
                    resolvedConfig:
                      description: ResolvedConfig holds the configuration that was
                        actually applied.
                      properties:
                        addressFamilies:
                          description: AddressFamilies configured.
                          items:
                            description: |-
                              AddressFamily is a BGP address family expressed as an AFI/SAFI pair.
                              Valid combinations: ipv4/unicast, ipv6/unicast, l2vpn/evpn.
                            properties:
                              afi:
                                description: AFI is the address family indicator.
                                enum:
                                - ipv4
                                - ipv6
                                - l2vpn
                                type: string
                              safi:
                                description: SAFI is the subsequent address family
                                  indicator.
                                enum:
                                - unicast
                                - evpn
                                type: string
                            required:
                            - afi
                            - safi
                            type: object
                            x-kubernetes-validations:
                            - message: IPv4 only supports unicast SAFI
                              rule: 'self.afi == ''ipv4'' ? self.safi == ''unicast''
                                : true'
                            - message: IPv6 only supports unicast SAFI
                              rule: 'self.afi == ''ipv6'' ? self.safi == ''unicast''
                                : true'
                            - message: L2VPN only supports evpn SAFI
                              rule: 'self.afi == ''l2vpn'' ? self.safi == ''evpn''
                                : true'
                          type: array
                        asNumber:
                          description: ASNumber is the AS number configured.
                          format: int64
                          type: integer
                        routerID:
                          description: RouterID resolved for this router.
                          type: string
                      type: object
                    routerName:
                      description: RouterName is the name of the BGPRouter this entry
                        describes.
                      type: string
                  required:
                  - routerName
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - routerName
                x-kubernetes-list-type: map
              vni:
                description: |-
                  VNI is the VXLAN Network Identifier applied to this VRF, as reported by the BGP runtime.
                  Populated once the controller has successfully configured the VRF on at least one router.
                format: int32
                maximum: 16777215
                minimum: 1
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
