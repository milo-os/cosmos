---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: bgprouters.bgp.miloapis.com
spec:
  group: bgp.miloapis.com
  names:
    kind: BGPRouter
    listKind: BGPRouterList
    plural: bgprouters
    shortNames:
    - bgpr
    singular: bgprouter
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetRef.name
      name: TARGET
      type: string
    - jsonPath: .spec.roles
      name: ROLES
      type: string
    - jsonPath: .spec.localASN
      name: ASN
      type: integer
    - jsonPath: .spec.routerID
      name: ROUTER-ID
      type: string
    - jsonPath: .status.phase
      name: PHASE
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BGPRouter defines a logical BGP routing context. It abstracts a processing
          instance bound to a specific execution context (e.g., a VRF or network
          namespace) on a target node and acts as the primary ownership boundary for
          BGPPeer, BGPAdvertisement, and BGPPolicy resources.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BGPRouterSpec defines the desired state of a BGPRouter.
            properties:
              addressFamilies:
                description: AddressFamilies defines the address families this router
                  activates.
                items:
                  description: |-
                    AddressFamily is a BGP address family expressed as an AFI/SAFI pair.
                    Valid combinations: ipv4/unicast, ipv6/unicast, l2vpn/evpn.
                  properties:
                    afi:
                      description: AFI is the address family indicator.
                      enum:
                      - ipv4
                      - ipv6
                      - l2vpn
                      type: string
                    safi:
                      description: SAFI is the subsequent address family indicator.
                      enum:
                      - unicast
                      - evpn
                      type: string
                  required:
                  - afi
                  - safi
                  type: object
                  x-kubernetes-validations:
                  - message: IPv4 only supports unicast SAFI
                    rule: 'self.afi == ''ipv4'' ? self.safi == ''unicast'' : true'
                  - message: IPv6 only supports unicast SAFI
                    rule: 'self.afi == ''ipv6'' ? self.safi == ''unicast'' : true'
                  - message: L2VPN only supports evpn SAFI
                    rule: 'self.afi == ''l2vpn'' ? self.safi == ''evpn'' : true'
                minItems: 1
                type: array
              localASN:
                description: |-
                  LocalASN is the BGP Autonomous System Number for this router.
                  Must be a valid 2-byte or 4-byte ASN per RFC 6793.
                format: int64
                maximum: 4294967295
                minimum: 1
                type: integer
              roles:
                description: |-
                  Roles describes the functional roles this router participates in.
                  At least one role is required.
                items:
                  description: RouterRole defines the functional role of a BGPRouter
                    within the network.
                  enum:
                  - fabric
                  - tenant
                  - transit
                  type: string
                minItems: 1
                type: array
              routerID:
                description: |-
                  RouterID is a unique 32-bit identifier expressed in IPv4 dotted-decimal notation.
                  In an IPv6-only underlay this is a logical identifier only.
                format: ipv4
                type: string
              targetRef:
                description: TargetRef identifies the Node this router executes on.
                properties:
                  kind:
                    description: Kind is the target resource kind (e.g. Node).
                    minLength: 1
                    type: string
                  name:
                    description: Name is the name of the target resource.
                    minLength: 1
                    type: string
                required:
                - kind
                - name
                type: object
            required:
            - addressFamilies
            - localASN
            - routerID
            - targetRef
            type: object
          status:
            description: BGPRouterStatus defines the observed state of a BGPRouter.
            properties:
              conditions:
                description: Conditions contains the standard conditions for this
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation this status
                  was computed from.
                format: int64
                type: integer
              peers:
                description: Peers summarizes peer session counts.
                properties:
                  established:
                    description: Established is the count of peers currently in the
                      Established state.
                    format: int32
                    type: integer
                  total:
                    description: Total is the total number of configured peers.
                    format: int32
                    type: integer
                required:
                - established
                - total
                type: object
              phase:
                description: Phase is the high-level lifecycle state of this router.
                type: string
              roles:
                description: Roles reflects the active roles as observed by the implementation.
                items:
                  description: RouterRole defines the functional role of a BGPRouter
                    within the network.
                  enum:
                  - fabric
                  - tenant
                  - transit
                  type: string
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
