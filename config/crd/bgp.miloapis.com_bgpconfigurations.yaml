---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: bgpconfigurations.bgp.miloapis.com
spec:
  group: bgp.miloapis.com
  names:
    kind: BGPConfiguration
    listKind: BGPConfigurationList
    plural: bgpconfigurations
    shortNames:
    - bgpconfig
    singular: bgpconfiguration
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.asNumber
      name: AS
      type: integer
    - jsonPath: .spec.listenPort
      name: Port
      type: integer
    - jsonPath: .status.conditions[?(@.type=="SpeakerReady")].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BGPConfiguration declares the local BGP speaker identity for the cluster.
          There should be exactly one BGPConfiguration per cluster.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              BGPConfigurationSpec declares the local BGP speaker identity.
              There should be exactly one BGPConfiguration per cluster.
            properties:
              addressFamilies:
                description: |-
                  AddressFamilies lists the address families the speaker should activate.
                  Defaults to IPv6 unicast only.
                items:
                  description: AddressFamily identifies a BGP address family.
                  properties:
                    afi:
                      description: AFI is the Address Family Indicator.
                      enum:
                      - IPv4
                      - IPv6
                      type: string
                    safi:
                      default: Unicast
                      description: SAFI is the Subsequent Address Family Indicator.
                      enum:
                      - Unicast
                      - Multicast
                      type: string
                  required:
                  - afi
                  type: object
                type: array
              asNumber:
                description: |-
                  ASNumber is the local AS number for this BGP speaker.
                  For single-cluster iBGP, all nodes share the same AS number.
                  For multi-cluster eBGP, each cluster has a unique AS number.
                format: int32
                maximum: 4294967295
                minimum: 1
                type: integer
              listenPort:
                default: 1790
                description: |-
                  ListenPort is the TCP port GoBGP listens on for BGP sessions.
                  Defaults to 1790 (Galactic convention, non-privileged).
                format: int32
                maximum: 65535
                minimum: 1
                type: integer
              routerID:
                description: |-
                  RouterID is the BGP router ID. Required when routerIDSource is "Manual".
                  Must be a valid IPv4 address in dotted-decimal notation (BGP convention).
                type: string
              routerIDSource:
                default: NodeIP
                description: |-
                  RouterIDSource controls how the router ID is determined.
                  "NodeIP" uses the node's IPv6 InternalIP (default).
                  "Manual" requires routerID to be set explicitly.
                enum:
                - NodeIP
                - Manual
                type: string
            required:
            - asNumber
            type: object
          status:
            description: BGPConfigurationStatus reflects the observed state of the
              BGP speaker.
            properties:
              conditions:
                description: Conditions describe the current state of the BGP configuration.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedASNumber:
                description: ObservedASNumber is the AS number currently configured
                  in GoBGP.
                format: int32
                type: integer
              observedRouterID:
                description: ObservedRouterID is the router ID currently configured
                  in GoBGP.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
