---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: bgpinstances.bgp.miloapis.com
spec:
  group: bgp.miloapis.com
  names:
    kind: BGPInstance
    listKind: BGPInstanceList
    plural: bgpinstances
    shortNames:
    - bgpi
    singular: bgpinstance
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.asNumber
      name: AS
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BGPInstance configures BGP speaker parameters on all providers
          matching spec.providerSelector.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BGPInstanceSpec defines the desired BGP speaker configuration.
            properties:
              addressFamilies:
                description: AddressFamilies lists the address families for this BGP
                  instance.
                items:
                  description: AddressFamily represents a BGP address family (AFI/SAFI
                    pair).
                  properties:
                    afi:
                      description: AFI is the Address Family Identifier.
                      enum:
                      - IPv4
                      - IPv6
                      type: string
                    safi:
                      description: SAFI is the Subsequent Address Family Identifier.
                      enum:
                      - Unicast
                      - VPNUnicast
                      type: string
                  required:
                  - afi
                  - safi
                  type: object
                minItems: 1
                type: array
              asNumber:
                description: ASNumber is the BGP autonomous system number.
                format: int64
                maximum: 4294967295
                minimum: 1
                type: integer
              bestPath:
                description: BestPath controls BGP best-path selection parameters.
                properties:
                  alwaysCompareMed:
                    description: AlwaysCompareMed enables MED comparison across different
                      ASes.
                    type: boolean
                  compareRouterId:
                    description: CompareRouterID uses router ID as a tiebreaker in
                      best-path selection.
                    type: boolean
                  deterministicMed:
                    description: DeterministicMed enables deterministic MED comparison.
                    type: boolean
                type: object
              providerSelector:
                description: ProviderSelector selects BGPProvider resources this instance
                  configures.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              routeReflector:
                description: |-
                  RouteReflector configures this instance as a route reflector.
                  Only valid in infra cluster role. Rejected in POP clusters.
                properties:
                  clusterID:
                    description: |-
                      ClusterID is the route reflector cluster ID.
                      BGP convention uses IPv4 dotted-quad format.
                    format: ipv4
                    type: string
                required:
                - clusterID
                type: object
              routerID:
                description: |-
                  RouterID is the explicit router ID. Required when routerIDSource is Manual.
                  BGP convention uses IPv4 dotted-quad format even on IPv6-only nodes.
                format: ipv4
                type: string
              routerIDSource:
                default: Auto
                description: |-
                  RouterIDSource controls how the router ID is derived.
                  Auto derives from the last 32 bits of the backing node's IPv6 InternalIP.
                  Manual requires an explicit routerID field.
                enum:
                - Auto
                - Manual
                type: string
              timers:
                description: Timers contains BGP timer defaults for this instance.
                properties:
                  defaultHoldTime:
                    default: 90
                    description: DefaultHoldTime is the default hold time in seconds.
                    format: int32
                    minimum: 3
                    type: integer
                  defaultKeepalive:
                    default: 30
                    description: DefaultKeepalive is the default keepalive interval
                      in seconds.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
            required:
            - addressFamilies
            - asNumber
            - providerSelector
            type: object
            x-kubernetes-validations:
            - message: routerID is required when routerIDSource is Manual
              rule: self.routerIDSource != 'Manual' || has(self.routerID)
            - message: routeReflector.clusterID is required when routeReflector is
                set
              rule: '!has(self.routeReflector) || has(self.routeReflector.clusterID)'
          status:
            description: BGPInstanceStatus defines the observed state of BGPInstance.
            properties:
              providers:
                description: Providers holds per-provider reconciliation status.
                items:
                  description: |-
                    ProviderStatus holds per-provider reconciliation status.
                    Used in status.providers arrays across BGPInstance, BGPPeer, BGPAdvertisement, BGPRoutePolicy.
                  properties:
                    conditions:
                      description: Conditions are the per-provider conditions.
                      items:
                        description: Condition contains details for one aspect of
                          the current state of this API Resource.
                        properties:
                          lastTransitionTime:
                            description: |-
                              lastTransitionTime is the last time the condition transitioned from one status to another.
                              This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                            format: date-time
                            type: string
                          message:
                            description: |-
                              message is a human readable message indicating details about the transition.
                              This may be an empty string.
                            maxLength: 32768
                            type: string
                          observedGeneration:
                            description: |-
                              observedGeneration represents the .metadata.generation that the condition was set based upon.
                              For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                              with respect to the current state of the instance.
                            format: int64
                            minimum: 0
                            type: integer
                          reason:
                            description: |-
                              reason contains a programmatic identifier indicating the reason for the condition's last transition.
                              Producers of specific condition types may define expected values and meanings for this field,
                              and whether the values are considered a guaranteed API.
                              The value should be a CamelCase string.
                              This field may not be empty.
                            maxLength: 1024
                            minLength: 1
                            pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                            type: string
                          status:
                            description: status of the condition, one of True, False,
                              Unknown.
                            enum:
                            - "True"
                            - "False"
                            - Unknown
                            type: string
                          type:
                            description: type of condition in CamelCase or in foo.example.com/CamelCase.
                            maxLength: 316
                            pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                            type: string
                        required:
                        - lastTransitionTime
                        - message
                        - reason
                        - status
                        - type
                        type: object
                      type: array
                      x-kubernetes-list-map-keys:
                      - type
                      x-kubernetes-list-type: map
                    daemon:
                      description: Daemon is the daemon type (FRR or GoBGP).
                      type: string
                    providerName:
                      description: ProviderName is the name of the BGPProvider this
                        entry describes.
                      type: string
                    resolvedConfig:
                      description: ResolvedConfig holds the configuration that was
                        actually applied.
                      properties:
                        address:
                          description: Address is the peer address (BGPPeer only).
                          type: string
                        addressFamilies:
                          description: AddressFamilies configured.
                          items:
                            description: AddressFamily represents a BGP address family
                              (AFI/SAFI pair).
                            properties:
                              afi:
                                description: AFI is the Address Family Identifier.
                                enum:
                                - IPv4
                                - IPv6
                                type: string
                              safi:
                                description: SAFI is the Subsequent Address Family
                                  Identifier.
                                enum:
                                - Unicast
                                - VPNUnicast
                                type: string
                            required:
                            - afi
                            - safi
                            type: object
                          type: array
                        allowAsIn:
                          description: AllowAsIn is the allowas-in count (BGPPeer
                            only).
                          format: int32
                          type: integer
                        asNumber:
                          description: ASNumber is the AS number configured.
                          format: int64
                          type: integer
                        listenPort:
                          description: ListenPort is the port BGP listens on (179
                            for FRR, 0 for GoBGP which initiates only).
                          format: int32
                          type: integer
                        passive:
                          description: Passive indicates passive mode (BGPPeer only).
                          type: boolean
                        passwordConfigured:
                          description: PasswordConfigured indicates whether a BGP
                            session password was applied.
                          type: boolean
                        resolvedPrefixes:
                          description: ResolvedPrefixes is the list of prefixes injected
                            (BGPAdvertisement only).
                          items:
                            type: string
                          type: array
                        routerID:
                          description: RouterID resolved for this provider (BGPInstance
                            only).
                          type: string
                        sessionType:
                          description: SessionType is iBGP or eBGP (BGPPeer only).
                          type: string
                        timers:
                          description: Timers resolved (merged from instance defaults
                            and peer overrides).
                          properties:
                            holdTime:
                              format: int32
                              type: integer
                            keepalive:
                              format: int32
                              type: integer
                          required:
                          - holdTime
                          - keepalive
                          type: object
                      type: object
                  required:
                  - daemon
                  - providerName
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - providerName
                x-kubernetes-list-type: map
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
