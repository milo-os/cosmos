---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: bgppeers.bgp.miloapis.com
spec:
  group: bgp.miloapis.com
  names:
    kind: BGPPeer
    listKind: BGPPeerList
    plural: bgppeers
    shortNames:
    - bgppr
    singular: bgppeer
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.routerRef.name
      name: ROUTER
      type: string
    - jsonPath: .spec.address
      name: PEER-ADDRESS
      type: string
    - jsonPath: .spec.peerASN
      name: PEER-ASN
      type: integer
    - jsonPath: .status.sessionState
      name: STATE
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BGPPeer defines a BGP session to a remote peer. It binds to one or more
          BGPRouter instances via routerRef or routerSelector.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BGPPeerSpec defines the desired state of BGPPeer.
            properties:
              address:
                description: Address is the remote peer's IPv4 or IPv6 address.
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: address must be a valid IPv4 or IPv6 address
                  rule: isIP(self)
              addressFamilies:
                description: AddressFamilies defines the address families negotiated
                  on this session.
                items:
                  description: |-
                    AddressFamily is a BGP address family expressed as an AFI/SAFI pair.
                    Valid combinations: ipv4/unicast, ipv6/unicast, l2vpn/evpn.
                  properties:
                    afi:
                      description: AFI is the address family indicator.
                      enum:
                      - ipv4
                      - ipv6
                      - l2vpn
                      type: string
                    safi:
                      description: SAFI is the subsequent address family indicator.
                      enum:
                      - unicast
                      - evpn
                      type: string
                  required:
                  - afi
                  - safi
                  type: object
                  x-kubernetes-validations:
                  - message: IPv4 only supports unicast SAFI
                    rule: 'self.afi == ''ipv4'' ? self.safi == ''unicast'' : true'
                  - message: IPv6 only supports unicast SAFI
                    rule: 'self.afi == ''ipv6'' ? self.safi == ''unicast'' : true'
                  - message: L2VPN only supports evpn SAFI
                    rule: 'self.afi == ''l2vpn'' ? self.safi == ''evpn'' : true'
                minItems: 1
                type: array
              authSecretRef:
                description: |-
                  AuthSecretRef references a Secret in the same namespace containing the
                  MD5 TCP authentication password under the key "password".
                properties:
                  name:
                    description: Name is the name of the Secret.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              authentication:
                description: |-
                  Authentication configures peer authentication.
                  AuthSecretRef takes precedence when both are set.
                properties:
                  password:
                    description: |-
                      Password is a plain-text authentication password.
                      Prefer AuthSecretRef for production deployments.
                    type: string
                type: object
              bfd:
                description: |-
                  BFD configures Bidirectional Forwarding Detection for fast failure
                  detection (sub-500ms). Without BFD, convergence relies on BGP hold
                  timers (default 90s).
                properties:
                  detectMultiplier:
                    description: |-
                      DetectMultiplier is the number of missed packets before declaring the
                      BFD session down. Default is 3.
                    format: int32
                    maximum: 50
                    minimum: 3
                    type: integer
                  enabled:
                    description: Enabled indicates whether BFD is enabled for this
                      peer.
                    type: boolean
                  minimumRx:
                    description: |-
                      MinimumRx is the minimum reception interval in microseconds.
                      Defaults to 300000 (300ms).
                    format: int32
                    type: integer
                  minimumTx:
                    description: |-
                      MinimumTx is the minimum transmission interval in microseconds.
                      FRR / GoBGP use microseconds — the controller converts to milliseconds
                      when programming the runtime. Defaults to 300000 (300ms).
                    format: int32
                    type: integer
                  multiHop:
                    description: |-
                      MultiHop enables BFD for eBGP multi-hop sessions (RFC 5883).
                      Must be true when ebgpMultiHop is true.
                    type: boolean
                type: object
              defaultOriginRoute:
                allOf:
                - enum:
                  - igp
                  - egp
                  - incomplete
                - enum:
                  - igp
                  - egp
                  - incomplete
                description: |-
                  DefaultOriginRoute controls default route origination for this peer.
                  "igp" originates a default route with IGP origin.
                  "egp" originates a default route with EGP origin.
                  "incomplete" originates a default route with incomplete origin.
                  Empty or unset means no default route origination.
                type: string
              description:
                description: Description is a human-readable label for this peer (e.g.,
                  "spine-1").
                type: string
              ebgpMultiHop:
                description: |-
                  EbgpMultiHop enables eBGP multihop when the peer is not directly connected.
                  When true, the TTL for BGP packets is set to 64 (vs. 1 for direct).
                type: boolean
              gracefulRestart:
                description: |-
                  GracefulRestart configures BGP graceful restart for this peer.
                  Prevents route flapping during control-plane restarts.
                properties:
                  enabled:
                    description: Enabled indicates whether graceful restart is enabled
                      for this peer.
                    type: boolean
                  restartTime:
                    description: |-
                      RestartTime is the maximum time (in seconds) the peer expects the
                      local system to complete a graceful restart. Range: 1-1200.
                      Default: 120 seconds.
                    format: int32
                    maximum: 1200
                    minimum: 1
                    type: integer
                type: object
              holdTime:
                description: |-
                  HoldTime is the BGP hold timer. Must be 0 (disabled) or >= 3s.
                  Defaults to 90s if unset.
                type: string
                x-kubernetes-validations:
                - message: holdTime must be 0 or >= 3s
                  rule: duration(self) == duration('0s') || duration(self) >= duration('3s')
              keepaliveTime:
                description: |-
                  KeepaliveTime is the BGP keepalive interval. Must be <= HoldTime / 3.
                  Defaults to 30s if unset. Maximum is 30s; the controller enforces
                  the keepalive <= holdTime / 3 constraint with an Accepted=False condition.
                type: string
                x-kubernetes-validations:
                - message: keepaliveTime must be 0 or <= 30s
                  rule: duration(self) == duration('0s') || duration(self) <= duration('30s')
              nextHopSelf:
                description: |-
                  NextHopSelf controls next-hop behavior for iBGP sessions.
                  When true, the local router's IP is used as next-hop for all
                  advertised routes. Common in EVPN iBGP peering.
                type: boolean
              peerASN:
                description: PeerASN is the remote AS number.
                format: int64
                maximum: 4294967295
                minimum: 1
                type: integer
              removePrivateAS:
                description: |-
                  RemovePrivateAS strips private AS numbers (64512-65535, 4200000000-4294967294)
                  from the AS path on eBGP export. If set to a non-zero value, private ASNs
                  are replaced with the specified value before export.
                format: int32
                maximum: 4294967295
                minimum: 0
                type: integer
              routerRef:
                description: |-
                  RouterRef targets a single BGPRouter by name.
                  Mutually exclusive with routerSelector.
                properties:
                  name:
                    description: Name is the name of the BGPRouter.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              routerSelector:
                description: |-
                  RouterSelector targets one or more BGPRouters by label.
                  Mutually exclusive with routerRef.
                properties:
                  matchExpressions:
                    description: MatchExpressions is a list of label selector requirements.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: MatchLabels is a map of key/value label pairs to
                      match.
                    type: object
                type: object
            required:
            - address
            - addressFamilies
            - peerASN
            type: object
            x-kubernetes-validations:
            - message: Exactly one of routerRef or routerSelector must be set
              rule: has(self.routerRef) != has(self.routerSelector)
          status:
            description: BGPPeerStatus defines the observed state of BGPPeer.
            properties:
              conditions:
                description: Conditions contains the standard conditions for this
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastEstablishedTime:
                description: LastEstablishedTime is the timestamp of the most recent
                  Established transition.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation this status
                  was computed from.
                format: int64
                type: integer
              sessionState:
                description: SessionState is the current BGP FSM state of this session.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
