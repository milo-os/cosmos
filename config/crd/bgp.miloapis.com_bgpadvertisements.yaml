---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: bgpadvertisements.bgp.miloapis.com
spec:
  group: bgp.miloapis.com
  names:
    kind: BGPAdvertisement
    listKind: BGPAdvertisementList
    plural: bgpadvertisements
    shortNames:
    - bgpadv
    singular: bgpadvertisement
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.routerRef.name
      name: ROUTER
      type: string
    - jsonPath: .spec.addressFamily.afi
      name: ADDRESS-FAMILY
      type: string
    - jsonPath: .status.advertisedPrefixes
      name: PREFIXES
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BGPAdvertisement defines routing information to advertise from a single BGPRouter.
          Prefixes are specified inline. Fan-out via routerSelector is intentionally not
          supported to avoid ambiguous prefix attribution across multiple routers.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BGPAdvertisementSpec defines the desired advertisement state.
            properties:
              addressFamily:
                description: AddressFamily defines the AFI/SAFI for this advertisement.
                properties:
                  afi:
                    description: AFI is the address family indicator.
                    enum:
                    - ipv4
                    - ipv6
                    - l2vpn
                    type: string
                  safi:
                    description: SAFI is the subsequent address family indicator.
                    enum:
                    - unicast
                    - evpn
                    type: string
                required:
                - afi
                - safi
                type: object
                x-kubernetes-validations:
                - message: IPv4 only supports unicast SAFI
                  rule: 'self.afi == ''ipv4'' ? self.safi == ''unicast'' : true'
                - message: IPv6 only supports unicast SAFI
                  rule: 'self.afi == ''ipv6'' ? self.safi == ''unicast'' : true'
                - message: L2VPN only supports evpn SAFI
                  rule: 'self.afi == ''l2vpn'' ? self.safi == ''evpn'' : true'
              communities:
                description: |-
                  Communities is the list of BGP communities to attach to advertised prefixes.
                  Format: ASN:NN or IP:NN.
                items:
                  type: string
                maxItems: 64
                type: array
              localPreference:
                description: |-
                  LocalPreference sets the BGP LOCAL_PREF attribute on advertised prefixes.
                  Only meaningful for iBGP sessions.
                format: int32
                maximum: 4294967295
                minimum: 0
                type: integer
              prefixes:
                description: Prefixes is the list of CIDR prefixes to advertise.
                items:
                  type: string
                maxItems: 256
                minItems: 1
                type: array
                x-kubernetes-list-type: set
              routerRef:
                description: RouterRef targets a single BGPRouter by name.
                properties:
                  name:
                    description: Name is the name of the BGPRouter.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
            required:
            - addressFamily
            - prefixes
            - routerRef
            type: object
          status:
            description: BGPAdvertisementStatus defines the observed state of BGPAdvertisement.
            properties:
              advertisedPrefixes:
                description: AdvertisedPrefixes is the count of prefixes currently
                  being originated.
                format: int32
                type: integer
              conditions:
                description: Conditions contains the standard conditions for this
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation this status
                  was computed from.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
